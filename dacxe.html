<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhaLy GO - Khách Hàng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        .page { display: none; } .active { display: block; }
        .selected { background-color: #ef4444 !important; color: white !important; }
        .tab-btn.active { border-bottom: 2px solid #ef4444; color: #ef4444; }
    </style>
</head>
<body class="bg-[#1a1c2e] text-slate-200 font-sans text-xs">

    <div id="login-page" class="page p-6 active">
        <div class="max-w-md mx-auto bg-[#242745] rounded-3xl mt-10 overflow-hidden border border-slate-700 shadow-2xl">
            <div class="bg-red-600 p-8 text-center font-black text-4xl italic text-white">KLG KHÁCH</div>
            
            <div id="login-form" class="p-8 space-y-4">
                <input id="phone" type="number" placeholder="Số điện thoại" class="w-full bg-[#1a1c2e] p-4 rounded-xl border border-slate-600 outline-none text-white text-base text-center">
                <input id="pass" type="password" placeholder="Mật khẩu" class="w-full bg-[#1a1c2e] p-4 rounded-xl border border-slate-600 outline-none text-white text-base text-center">
                <button onclick="handleLogin()" class="w-full bg-red-600 py-4 rounded-xl text-white font-black text-base shadow-lg active:scale-95 transition-transform">ĐĂNG NHẬP</button>
                <button onclick="toggleAuth('reg')" class="w-full text-slate-400 font-bold uppercase mt-2 text-center py-2">Đăng ký khách mới</button>
            </div>

            <div id="reg-form" class="p-8 space-y-4 hidden">
                <h3 class="text-center font-bold text-blue-400 uppercase mb-2">Đăng ký Khách</h3>
                <input id="r-phone" type="number" placeholder="SĐT đăng ký" class="w-full bg-[#1a1c2e] p-4 rounded-xl border border-slate-600 text-white text-base text-center">
                <input id="r-pass" type="password" placeholder="Mật khẩu" class="w-full bg-[#1a1c2e] p-4 rounded-xl border border-slate-600 text-white text-base text-center">
                <button onclick="handleRegister()" class="w-full bg-blue-600 py-4 rounded-xl font-black text-white text-base">ĐĂNG KÝ NGAY</button>
                <button onclick="toggleAuth('login')" class="w-full text-slate-500 text-center block py-2">Quay lại đăng nhập</button>
            </div>
        </div>
    </div>

    <div id="khach-page" class="page p-4">
        <div class="flex justify-between items-center mb-4 border-b border-slate-700 pb-2">
            <span class="text-red-500 font-black italic text-sm uppercase">KhaLy GO</span>
            <div class="flex gap-2">
                <button onclick="location.href='tel:0789454369'" class="bg-blue-600 px-2 py-1 rounded font-bold">📞 ADMIN</button>
                <button onclick="logout()" class="text-red-400 border border-red-400 px-2 py-1 rounded font-bold uppercase text-[8px]">Thoát</button>
            </div>
        </div>
        
        <div id="welcome-msg" class="text-center text-yellow-400 font-bold italic mb-4 text-[13px] animate-bounce"></div>

        <div class="flex border-b border-slate-700 mb-4 text-center font-bold">
            <button onclick="showTxTab('kh-booking')" id="kh-tab-o" class="flex-1 py-2 tab-btn active uppercase text-[10px]">Đặt xe</button>
            <button onclick="showTxTab('kh-profile')" id="kh-tab-p" class="flex-1 py-2 tab-btn uppercase text-[10px]">Hồ sơ</button>
        </div>
        
        <div id="kh-booking" class="space-y-4">
            <div class="bg-[#242745] p-5 rounded-2xl border border-slate-700 space-y-4 shadow-2xl">
                <!-- THÊM MỤC LÁI HỘ VÀO GRID -->
                <div class="grid grid-cols-2 gap-2 font-black uppercase">
                    <button onclick="setSvc('Xe ôm',this); hideExtra()" class="svc-btn bg-slate-800 p-3 rounded-xl border border-slate-600">🏍️ Xe ôm</button>
                    <button onclick="setSvc('Xe bao',this); showExtra('xb-opt')" class="svc-btn bg-slate-800 p-3 rounded-xl border border-slate-600">🚗 Xe bao</button>
                    <button onclick="setSvc('Tiện chuyến',this); hideExtra()" class="svc-btn bg-slate-800 p-3 rounded-xl border border-slate-600">🤝 Tiện chuyến</button>
                    <button onclick="setSvc('1 chiều',this); hideExtra()" class="svc-btn bg-slate-800 p-3 rounded-xl border border-slate-600">➡️ 1 chiều</button>
                    <!-- NÚT LÁI HỘ MỚI -->
                    <button onclick="setSvc('Lái hộ',this); showExtra('lh-opt')" class="svc-btn bg-slate-800 p-3 rounded-xl border border-slate-600 col-span-2 text-yellow-400 border-yellow-500/50">🧑‍✈️ DỊCH VỤ LÁI HỘ</button>
                </div>

                <!-- TÙY CHỌN XE BAO (CŨ) -->
                <div id="xb-opt" class="hidden grid grid-cols-3 gap-2 py-2 border-t border-slate-700">
                    <button onclick="setSvc('Xe bao 4c',this)" class="sub-btn bg-slate-700 p-2 rounded text-[9px] font-bold">4 CHỖ</button>
                    <button onclick="setSvc('Xe bao 7c',this)" class="sub-btn bg-slate-700 p-2 rounded text-[9px] font-bold">7 CHỖ</button>
                    <button onclick="setSvc('Xe bao 16c',this)" class="sub-btn bg-slate-700 p-2 rounded text-[9px] font-bold">16 CHỖ</button>
                </div>

                <!-- TÙY CHỌN LÁI HỘ (MỚI) -->
                <div id="lh-opt" class="hidden space-y-3 py-2 border-t border-yellow-500/30">
                    <p class="text-yellow-500 font-bold text-center italic text-[10px]">Vui lòng chọn loại xe của bạn</p>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="setSvc('Lái hộ 4c',this)" class="sub-btn bg-slate-700 p-2 rounded text-[9px] font-bold italic">XE 4 CHỖ</button>
                        <button onclick="setSvc('Lái hộ 7c',this)" class="sub-btn bg-slate-700 p-2 rounded text-[9px] font-bold italic">XE 7 CHỖ</button>
                    </div>
                    <input id="ten-xe" type="text" placeholder="Nhập tên xe (VD: Innova, Mazda 3...)" class="w-full bg-[#1a1c2e] p-3 rounded-xl border border-slate-600 text-white italic">
                </div>

                <input id="final-svc" type="hidden">
                <input id="tu" type="text" placeholder="Điểm đón khách" class="w-full bg-[#1a1c2e] p-4 rounded-xl border border-slate-600 text-white">
                <input id="den" type="text" placeholder="Điểm đến (nếu có)" class="w-full bg-[#1a1c2e] p-4 rounded-xl border border-slate-600 text-white">
                
                <div class="flex gap-2">
                    <div class="flex-1">
                        <label class="text-[9px] text-slate-400 ml-2">Ngày đón</label>
                        <input id="ng" type="date" class="w-full bg-[#1a1c2e] p-4 rounded-xl text-white outline-none font-bold border border-slate-700 mt-1">
                    </div>
                    <div class="flex-1">
                        <label class="text-[9px] text-slate-400 ml-2">Giờ đón</label>
                        <input id="gi" type="time" class="w-full bg-[#1a1c2e] p-4 rounded-xl border border-slate-700 text-white font-bold mt-1">
                    </div>
                </div>

                <input id="note" type="text" placeholder="Ghi chú cho tài xế & Admin..." class="w-full bg-[#1a1c2e] p-4 rounded-xl border border-slate-600 text-white">
                
                <button id="submit-btn" onclick="createOrder()" class="w-full bg-red-600 py-4 rounded-xl font-black text-base uppercase text-white shadow-xl italic">Gửi yêu cầu đặt xe</button>
                <button id="cancel-edit-btn" onclick="cancelEdit()" class="w-full bg-slate-600 py-2 rounded-xl font-bold uppercase text-white hidden">Hủy chỉnh sửa</button>
                <input id="editing-key" type="hidden">
            </div>
            <div id="kh-list" class="mt-6 space-y-2"></div>
        </div>

        <div id="kh-profile" class="hidden space-y-4">
            <div class="bg-[#242745] p-4 rounded-xl border border-slate-700 space-y-3 text-center">
                <p class="text-yellow-500 font-bold">SĐT: <span id="display-phone"></span></p>
                <input id="kh-name" type="text" placeholder="Họ và Tên của bạn" class="w-full bg-[#1a1c2e] p-3 rounded-lg border border-slate-600 text-white outline-none text-center">
                <button updateProfile()" class="w-full bg-blue-600 py-3 rounded-xl font-black uppercase text-white shadow-lg">Lưu thông tin</button>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA7D06JXpU4zFnT2pYpbuZlw-YCb8F8VpQ",
        authDomain: "khaly-go-23798.firebaseapp.com",
        databaseURL: "https://khaly-go-23798-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "khaly-go-23798", storageBucket: "khaly-go-23798.appspot.com",
        messagingSenderId: "328254923276", appId: "1:328254923276:web:625f6be13a31b0a9264429"
    };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();

    // HÀM HIỂN THỊ TÙY CHỌN THÊM
    function showExtra(id) {
        hideExtra();
        document.getElementById(id).classList.remove('hidden');
    }
    function hideExtra() {
        document.getElementById('xb-opt').classList.add('hidden');
        document.getElementById('lh-opt').classList.add('hidden');
    }

    function showWelcome() {
        const msgs = [
            "Chào ngày mới tốt lành nha sếp! ✨",
            "Hôm nay mình đi đâu đây bạn ơi? 🚗",
            "Chúc bạn một chuyến đi vui vẻ & an toàn! ❤️",
            "Cảm ơn bạn đã tin tưởng KhaLy GO! 🤝",
            "Ngày mới tràn đầy năng lượng nhé! 🌈"
        ];
        document.getElementById('welcome-msg').innerText = msgs[Math.floor(Math.random() * msgs.length)];
    }

    function handleLogin() {
        const p = document.getElementById('phone').value, mk = document.getElementById('pass').value;
        db.ref('users/' + p).once('value', s => {
            const u = s.val(); 
            if (u && u.pass === mk) {
                if (u.role === 'taixe') return alert("Tài khoản này là TÀI XẾ. Vui lòng dùng App Tài Xế!");
                if (u.role === 'khach') saveSession(p, 'khach');
            } else {
                alert("Số điện thoại hoặc mật khẩu không đúng!");
            }
        });
    }

    function handleRegister() {
        const p = document.getElementById('r-phone').value, mk = document.getElementById('r-pass').value;
        if(!p || !mk) return alert("Vui lòng nhập đầy đủ!");
        db.ref('users/' + p).once('value', s => {
            if (s.exists() && s.val().role === 'taixe') {
                alert("Số điện thoại này đã đăng ký TÀI XẾ, không thể đăng ký Khách!");
            } else {
                db.ref('users/'+p).set({pass:mk, role:'khach', soDu:0}).then(() => { 
                    alert("Đăng ký thành công!"); 
                    saveSession(p, 'khach'); 
                });
            }
        });
    }

    function setSvc(v, b) { 
        document.getElementById('final-svc').value = v;
        document.querySelectorAll('.svc-btn, .sub-btn').forEach(el => el.classList.remove('selected'));
        if(b) b.classList.add('selected');
    }

    function createOrder() {
        const u = JSON.parse(localStorage.getItem('klg_u'));
        const s = document.getElementById('final-svc').value;
        const t = document.getElementById('tu').value;
        const d = document.getElementById('den').value || "Chưa rõ";
        const dt = document.getElementById('ng').value; 
        const tm = document.getElementById('gi').value; 
        const note = document.getElementById('note').value;
        const tenXe = document.getElementById('ten-xe').value; // MỚI
        const editKey = document.getElementById('editing-key').value;
        
        if(!s || !t || !dt || !tm) return alert("Vui lòng nhập đủ Dịch vụ, Điểm đón, Ngày và Giờ!");
        
        const orderData = {
            khach: u.p, 
            svc: s, 
            tu: t, 
            den: d, 
            date: dt, 
            time: tm, 
            ghiChu: note,
            tenXeKhach: tenXe || "", // GỬI THÊM TÊN XE NẾU LÀ LÁI HỘ
            status: 'cho'
        };

        if(editKey) {
            db.ref('orders/' + editKey).update(orderData).then(() => {
                alert("Đã cập nhật đơn hàng!");
                cancelEdit();
            });
        } else {
            db.ref('orders').push(orderData).then(() => {
                alert("Đã gửi đơn! Vui lòng đợi Admin báo giá.");
                resetForm();
            });
        }
    }

    function editOrder(key, svc, tu, den, date, time, note, tenXe) {
        document.getElementById('editing-key').value = key;
        document.getElementById('tu').value = tu;
        document.getElementById('den').value = den;
        document.getElementById('ng').value = date;
        document.getElementById('gi').value = time;
        document.getElementById('note').value = note || "";
        document.getElementById('ten-xe').value = tenXe || "";
        document.getElementById('final-svc').value = svc;
        document.getElementById('submit-btn').innerText = "CẬP NHẬT ĐƠN HÀNG";
        document.getElementById('cancel-edit-btn').classList.remove('hidden');
        window.scrollTo(0,0);
    }

    function cancelEdit() {
        document.getElementById('editing-key').value = "";
        resetForm();
        document.getElementById('submit-btn').innerText = "Gửi yêu cầu đặt xe";
        document.getElementById('cancel-edit-btn').classList.add('hidden');
    }

    function resetForm() {
        document.getElementById('tu').value = "";
        document.getElementById('den').value = "";
        document.getElementById('note').value = "";
        document.getElementById('ten-xe').value = "";
        document.querySelectorAll('.svc-btn, .sub-btn').forEach(el => el.classList.remove('selected'));
        hideExtra();
    }

    function loadKhach() {
        const u = JSON.parse(localStorage.getItem('klg_u'));
        if(!u) return;
        document.getElementById('display-phone').innerText = u.p;
        showWelcome();
        
        db.ref('orders').on('value', s => {
            let h = ""; 
            let list = [];
            s.forEach(o => { 
                const d = o.val();
                if (d.khach === u.p && d.status !== 'hoan_thanh') {
                    list.unshift({key: o.key, ...d});
                }
            });

            list.forEach(d => {
                let driverSection = "";
                // NẾU TÀI XẾ ĐÃ NHẬN ĐƠN -> HIỆN SĐT
                if (d.idTaiXe && (d.status === 'nhan' || d.status === 'dang_chay')) {
                    driverSection = `
                    <div class="mt-3 p-3 bg-slate-900 rounded-xl border border-green-500/50 flex justify-between items-center animate-pulse">
                        <div>
                            <p class="text-green-400 font-bold text-[10px]">🚖 TÀI XẾ ĐÃ NHẬN ĐƠN</p>
                            <p class="text-white font-black text-sm">SĐT: ${d.idTaiXe}</p>
                        </div>
                        <a href="tel:${d.idTaiXe}" class="bg-green-600 p-3 rounded-full shadow-lg">
                            <span class="text-base">📞</span>
                        </a>
                    </div>`;
                }

                h += `<div class="bg-[#242745] p-4 rounded-xl border border-slate-700 mb-2 relative shadow-lg">
                    <div class="flex justify-between">
                        <p class="text-red-500 font-bold uppercase text-[9px] mb-1">🚗 ${d.svc}</p>
                        ${d.tenXeKhach ? `<span class="text-yellow-400 text-[8px] font-bold italic">Xe: ${d.tenXeKhach}</span>` : ''}
                    </div>
                    <p class="text-white font-bold italic text-[10px]">📅 ${d.date} | ⏰ ${d.time}</p>
                    <p class="text-slate-300">📍 ${d.tu} → ${d.den}</p>
                    ${d.ghiChu ? `<p class="text-blue-300 text-[9px] italic">📝 ${d.ghiChu}</p>` : ''}
                    <p class="text-yellow-500 font-black mt-1 text-[11px] italic">
                        ${d.status === 'cho' ? '⌛ Đang đợi báo giá...' : (d.status === 'da' ? '💰 GIÁ: ' + d.gia + 'K' : (d.status === 'khach_huy' ? '❌ Bạn đã hủy đơn' : '✅ Tài xế đã nhận đơn'))}
                    </p>
                    ${driverSection}
                    ${(!d.idTaiXe && d.status !== 'khach_huy') ? `
                        <div class="flex gap-2 mt-2">
                            <button onclick="editOrder('${d.key}', '${d.svc}', '${d.tu}', '${d.den}', '${d.date}', '${d.time}', '${d.ghiChu || ''}', '${d.tenXeKhach || ''}')" class="flex-1 bg-slate-700 py-1 rounded text-white font-bold text-[9px]">SỬA</button>
                            <button onclick="if(confirm('Xác nhận hủy đơn này?')) db.ref('orders/${d.key}').remove()" class="flex-1 bg-red-900/50 py-1 rounded text-red-400 font-bold text-[9px]">HỦY ĐƠN</button>
                        </div>` : ''}
                </div>`; 
            });
            document.getElementById('kh-list').innerHTML = h || "<p class='text-center opacity-50 py-10 italic'>Bạn chưa có đơn hàng nào.</p>";
        });
    }

    function showTxTab(id) { 
        document.getElementById('kh-booking').classList.toggle('hidden', id !== 'kh-booking');
        document.getElementById('kh-profile').classList.toggle('hidden', id !== 'kh-profile');
        document.getElementById('kh-tab-o').classList.toggle('active', id === 'kh-booking');
        document.getElementById('kh-tab-p').classList.toggle('active', id === 'kh-profile');
    }

    function updateProfile() {
        const u = JSON.parse(localStorage.getItem('klg_u'));
        const n = document.getElementById('kh-name').value;
        db.ref('users/'+u.p).update({ten:n}).then(() => alert("Đã cập nhật tên!"));
    }

    function saveSession(p, r) { localStorage.setItem('klg_u', JSON.stringify({p, r})); location.reload(); }
    function logout() { localStorage.removeItem('klg_u'); location.reload(); }
    function toggleAuth(t) { 
        document.getElementById('login-form').classList.toggle('hidden', t==='reg'); 
        document.getElementById('reg-form').classList.toggle('hidden', t==='login'); 
    }

    window.onload = () => { 
        const u = localStorage.getItem('klg_u'); 
        if(u){ 
            const j = JSON.parse(u); 
            if(j.r === 'khach') {
                document.getElementById('login-page').classList.remove('active'); 
                document.getElementById('khach-page').classList.add('active'); 
                loadKhach();
            }
        } 
    };
</script>
</body>
</html>
