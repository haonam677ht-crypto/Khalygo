<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhaLy GO - Admin & Driver</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        .page { display: none; } .active { display: block; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-[#1a1c2e] text-slate-200 font-sans text-[11px]">

    <div id="login-page" class="page p-6 active">
        <div class="max-w-md mx-auto bg-[#242745] rounded-3xl mt-10 overflow-hidden border border-slate-700 shadow-2xl text-center">
            <div class="bg-red-600 p-8 font-black text-4xl italic text-white">KLG</div>
            <div class="p-8 space-y-4">
                <input id="phone" type="number" placeholder="Số điện thoại" class="w-full bg-[#1a1c2e] p-4 rounded-xl border border-slate-600 outline-none text-white text-base text-center">
                <input id="pass" type="password" placeholder="Mật khẩu" class="w-full bg-[#1a1c2e] p-4 rounded-xl border border-slate-600 outline-none text-white text-base text-center">
                <button onclick="handleLogin()" class="w-full bg-red-600 py-4 rounded-xl text-white font-black text-base uppercase">Đăng nhập</button>
                <button onclick="showPage('register-page')" class="text-slate-400 uppercase font-bold text-[10px] mt-2 block w-full">Đăng ký tài xế mới</button>
            </div>
        </div>
    </div>

    <div id="register-page" class="page p-6">
        <div class="max-w-md mx-auto bg-[#242745] rounded-3xl mt-10 overflow-hidden border border-slate-700 shadow-2xl text-center">
            <div class="bg-red-600 p-6 font-black text-2xl italic text-white">KLG</div>
            <p class="text-blue-400 font-bold uppercase py-2">Đăng ký tài xế mới</p>
            <div class="p-8 space-y-4">
                <input id="reg-phone" type="number" placeholder="SĐT đăng ký" class="w-full bg-[#1a1c2e] p-4 rounded-xl border border-slate-600 outline-none text-white text-base text-center">
                <input id="reg-pass" type="password" placeholder="Mật khẩu" class="w-full bg-[#1a1c2e] p-4 rounded-xl border border-slate-600 outline-none text-white text-base text-center">
                <button onclick="handleRegister()" class="w-full bg-blue-600 py-4 rounded-xl text-white font-black text-base uppercase">Gửi yêu cầu</button>
                <button onclick="showPage('login-page')" class="text-slate-400 text-[10px] block w-full">Quay lại đăng nhập</button>
            </div>
        </div>
    </div>

    <div id="admin-page" class="page p-4">
        <div class="flex justify-between items-center mb-4 border-b border-slate-700 pb-2">
            <span class="text-yellow-400 font-black uppercase text-sm italic">HỆ THỐNG QUẢN TRỊ</span>
            <button onclick="logout()" class="text-red-400 border border-red-400 px-3 py-1 rounded font-bold uppercase">Thoát</button>
        </div>

        <section class="bg-orange-900/10 rounded-xl border border-orange-500/50 overflow-hidden mb-4">
            <div class="p-2 bg-orange-600 text-white font-black uppercase italic flex justify-between items-center">
                <span>🕒 TÀI XẾ CHỜ DUYỆT</span>
                <span id="count-pending" class="bg-white text-orange-600 px-2 rounded-full">0</span>
            </div>
            <div id="ad-pending-list" class="p-2 space-y-2"></div>
        </section>
        
        <div class="bg-blue-900/20 p-4 rounded-xl border border-blue-500/30 mb-4 space-y-2">
            <h3 class="text-blue-400 font-black uppercase italic text-[10px]">➕ SẾP TỰ TẠO ĐƠN</h3>
            <input id="ad-p" type="number" placeholder="SĐT Khách" class="w-full bg-slate-800 p-2 rounded border border-slate-600 text-white">
            <input id="ad-svc" type="text" placeholder="Loại xe (4c, 7c...)" class="w-full bg-slate-800 p-2 rounded border border-slate-600 text-white">
            <div class="grid grid-cols-2 gap-2">
                <input id="ad-tu-new" type="text" placeholder="Điểm đi" class="bg-slate-800 p-2 rounded border border-slate-600 text-white">
                <input id="ad-den-new" type="text" placeholder="Điểm đến" class="bg-slate-800 p-2 rounded border border-slate-600 text-white">
            </div>
            <div class="grid grid-cols-2 gap-2">
                <input id="ad-date" type="date" class="bg-slate-800 p-2 rounded border border-slate-600 text-white">
                <input id="ad-time" type="time" class="bg-slate-800 p-2 rounded border border-slate-600 text-white">
            </div>
            <input id="ad-note-new" type="text" placeholder="Ghi chú thêm" class="w-full bg-slate-800 p-2 rounded border border-slate-600 text-white">
            <button onclick="adminCreateOrder()" class="w-full bg-blue-600 py-3 rounded font-black mt-1 uppercase text-white shadow-lg">Tạo đơn</button>
        </div>

        <div class="bg-green-900/20 p-4 rounded-xl border border-green-500/30 mb-4 text-center">
            <h3 class="text-green-400 font-black uppercase italic text-[10px] mb-2">💰 VÍ TIỀN TÀI XẾ</h3>
            <button onclick="napTienTX()" class="w-full bg-green-600 py-3 rounded font-black uppercase text-white shadow-md">BẤM NẠP TIỀN</button>
        </div>

        <section class="mb-4">
            <h3 class="text-yellow-400 font-black mb-2 uppercase italic text-[10px]">🔔 ĐƠN HIỆN TẠI</h3>
            <div id="ad-ord-list" class="space-y-2"></div>
        </section>

        <section class="bg-[#242745] rounded-xl border border-slate-700 overflow-hidden mb-4">
            <button onclick="toggleDiv('ad-tx-list')" class="w-full p-3 flex justify-between items-center font-black text-yellow-400 uppercase text-[10px]">
                <span>📂 DANH SÁCH TÀI XẾ ĐÃ DUYỆT</span>
                <span>▼</span>
            </button>
            <div id="ad-tx-list" class="p-2 space-y-1"></div>
        </section>

        <section class="bg-slate-800/50 rounded-xl border border-slate-700 overflow-hidden">
            <button onclick="toggleDiv('ad-cus-list')" class="w-full p-3 flex justify-between items-center font-black text-blue-400 uppercase text-[10px]">
                <span>👤 DANH SÁCH KHÁCH HÀNG</span>
                <span>▼</span>
            </button>
            <div id="ad-cus-list" class="p-2 space-y-1"></div>
        </section>
    </div>

    <div id="taixe-page" class="page p-4">
        <div class="flex justify-between items-center mb-2">
            <span class="text-green-400 font-black italic">BÁC TÀI KLG</span>
            <button onclick="logout()" class="text-red-400 border border-red-500 px-3 py-1 rounded font-bold text-[9px]">THOÁT</button>
        </div>
        <div class="bg-[#242745] p-4 rounded-xl border border-slate-700 text-center mb-4 shadow-xl">
            <p class="text-slate-400 text-[10px] uppercase">VÍ TIỀN</p>
            <p id="tx-balance" class="text-yellow-400 text-2xl font-black">0K</p>
        </div>
        <div class="flex border-b border-slate-700 mb-4 bg-[#242745] rounded-t-xl overflow-hidden">
            <button id="tab-btn-don" onclick="showTxTab('tx-don')" class="flex-1 py-3 font-black text-red-500 border-b-2 border-red-500">ĐƠN HÀNG</button>
            <button id="tab-btn-hoso" onclick="showTxTab('tx-hoso')" class="flex-1 py-3 font-black text-slate-400">HỒ SƠ CỦA TÔI</button>
        </div>
        <div id="tx-don" class="tx-tab space-y-3">Đang quét đơn...</div>
        <div id="tx-hoso" class="tx-tab hidden space-y-3">
             <input id="tx-ten" type="text" placeholder="Họ và Tên" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-600 text-white">
             <input id="tx-bl" type="text" placeholder="Link ảnh Bằng lái" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-600 text-white">
             <input id="tx-ax" type="text" placeholder="Link ảnh Xe" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-600 text-white">
             <input id="tx-cv" type="text" placeholder="Link ảnh Cà vẹt" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-600 text-white">
             <button onclick="saveHoSo()" class="w-full bg-green-600 py-3 rounded-xl font-black text-white uppercase shadow-lg">Lưu hồ sơ</button>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA7D06JXpU4zFnT2pYpbuZlw-YCb8F8VpQ",
        authDomain: "khaly-go-23798.firebaseapp.com",
        databaseURL: "https://khaly-go-23798-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "khaly-go-23798", storageBucket: "khaly-go-23798.appspot.com",
        messagingSenderId: "328254923276", appId: "1:328254923276:web:625f6be13a31b0a9264429"
    };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();

    function handleLogin() {
        const p = document.getElementById('phone').value, mk = document.getElementById('pass').value;
        if (p === "0789454369" && mk === "19861990LyVinh@") return saveSession(p, 'admin');
        db.ref('users/' + p).once('value', s => {
            const u = s.val(); 
            if (u && u.pass === mk) {
                if(u.status === 'pending') return alert("Tài khoản đang chờ duyệt!");
                saveSession(p, u.role);
            } else alert("Sai thông tin!");
        });
    }

    function handleRegister() {
        const p = document.getElementById('reg-phone').value, mk = document.getElementById('reg-pass').value;
        if(!p || !mk) return alert("Nhập đủ thông tin!");
        db.ref('users/' + p).once('value', s => {
            if(s.exists()) return alert("Số điện thoại này đã được sử dụng!");
            db.ref('users/' + p).set({ pass: mk, role: 'taixe', status: 'pending', soDu: 0 })
            .then(() => { alert("Đăng ký thành công! Đợi admin duyệt."); showPage('login-page'); });
        });
    }

    function loadAdmin() {
        // Duyệt tài xế
        db.ref('users').orderByChild('status').equalTo('pending').on('value', s => {
            let h = "", count = 0;
            s.forEach(u => { count++;
                h += `<div class="p-3 bg-slate-900 rounded-lg flex justify-between items-center mb-1">
                    <span class="font-bold">${u.key}</span>
                    <div class="flex gap-1">
                        <button onclick="viewInfo('${u.key}')" class="bg-blue-600 px-2 py-1 rounded text-[9px]">XEM HS</button>
                        <button onclick="db.ref('users/${u.key}').update({status:'active'})" class="bg-green-600 px-2 py-1 rounded text-[9px]">DUYỆT</button>
                    </div>
                </div>`;
            });
            document.getElementById('ad-pending-list').innerHTML = h || "Trống";
            document.getElementById('count-pending').innerText = count;
        });

        // Đơn hàng admin - Có Ngày Giờ
        db.ref('orders').on('value', s => {
            let h = "";
            s.forEach(o => {
                const d = o.val();
                h += `<div class="bg-slate-800 p-3 rounded border-l-4 ${d.status==='da'?'border-green-500':'border-yellow-500'} mb-2 relative">
                    <button onclick="db.ref('orders/${o.key}').remove()" class="absolute top-1 right-2 text-red-500">×</button>
                    <p class="text-red-500 font-bold uppercase text-[9px]">🚗 ${d.svc}</p>
                    <p class="text-white font-black">📅 Đón: ${d.date} | ⏰ ${d.time}</p>
                    <p class="text-blue-400">📞 Khách: ${d.khach}</p>
                    <p class="text-slate-300">📍 ${d.tu} → ${d.den}</p>
                    <input id="note-${o.key}" type="text" value="${d.ghiChuAdmin || ''}" placeholder="Ghi chú" class="w-full bg-slate-900 p-2 mt-2 rounded border border-slate-700 text-white text-[10px]">
                    <div class="flex gap-2 mt-2">
                        <input id="price-${o.key}" type="number" value="${d.gia || ''}" placeholder="Giá" class="w-20 bg-slate-900 p-2 rounded text-green-400 font-bold border border-slate-700">
                        <button onclick="pushPrice('${o.key}')" class="flex-1 bg-green-600 font-black py-2 rounded text-white italic uppercase">Đẩy giá</button>
                    </div>
                </div>`;
            });
            document.getElementById('ad-ord-list').innerHTML = h || "Chưa có đơn";
        });

        // HIỂN THỊ DANH SÁCH TÀI XẾ & KHÁCH
        db.ref('users').on('value', s => {
            let hTx = "", hC = "";
            s.forEach(u => {
                const ud = u.val();
                if(ud.status === 'pending') return;
                const item = `<div class="p-2 border-b border-slate-700 flex justify-between items-center">
                    <span class="text-slate-300">${ud.ten || u.key}</span>
                    <div class="flex gap-3 items-center">
                        <span class="text-yellow-500 font-bold">${ud.soDu || 0}K</span>
                        <a href="tel:${u.key}" class="text-blue-400">GỌI</a>
                        <button onclick="deleteUser('${u.key}')" class="text-red-500">×</button>
                    </div>
                </div>`;
                if(ud.role === 'taixe') hTx += item; else if(ud.role === 'khach') hC += item;
            });
            document.getElementById('ad-tx-list').innerHTML = hTx || "Chưa có tài xế";
            document.getElementById('ad-cus-list').innerHTML = hC || "Chưa có khách";
        });
    }

    function loadTaixe(phone) {
        db.ref('users/'+phone).on('value', s => {
            const u = s.val();
            document.getElementById('tx-balance').innerText = (u.soDu || 0) + "K";
            document.getElementById('tx-ten').value = u.ten || "";
            document.getElementById('tx-bl').value = u.bl || "";
            document.getElementById('tx-ax').value = u.ax || "";
            document.getElementById('tx-cv').value = u.cv || "";
        });

        db.ref('orders').on('value', s => {
            let h = "";
            s.forEach(o => {
                const d = o.val();
                if(d.status === 'da') {
                    h += `<div class="bg-[#242745] p-4 rounded-xl border-l-4 border-green-500 shadow-md">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-red-500 font-black uppercase text-[10px] italic">🚗 ${d.svc}</span>
                            <span class="text-yellow-400 font-black text-xl">${d.gia}K</span>
                        </div>
                        <p class="text-white font-black text-[12px] mb-2 italic">📅 LỊCH: ${d.date} | ⏰ ${d.time}</p>
                        <p class="text-slate-300"><span class="text-green-500">Đi:</span> ${d.tu}</p>
                        <p class="text-slate-300 mb-2"><span class="text-red-500">Đến:</span> ${d.den}</p>
                        <p class="text-slate-500 text-[10px] bg-slate-900 p-2 rounded">Ghi chú: ${d.ghiChuAdmin || 'Không'}</p>
                        <a href="tel:${d.khach}" class="block w-full bg-blue-600 text-center py-3 rounded-xl mt-3 font-black text-white shadow-lg">GỌI KHÁCH</a>
                    </div>`;
                }
            });
            document.getElementById('tx-don').innerHTML = h || "Đang quét đơn mới...";
        });
    }

    function saveHoSo() {
        const u = JSON.parse(localStorage.getItem('klg_u'));
        const data = {
            ten: document.getElementById('tx-ten').value,
            bl: document.getElementById('tx-bl').value,
            ax: document.getElementById('tx-ax').value,
            cv: document.getElementById('tx-cv').value
        };
        db.ref('users/'+u.p).update(data).then(() => alert("Đã lưu hồ sơ!"));
    }

    function showTxTab(tab) {
        document.querySelectorAll('.tx-tab').forEach(t => t.classList.add('hidden'));
        document.getElementById(tab).classList.remove('hidden');
        document.getElementById('tab-btn-don').className = "flex-1 py-3 font-black " + (tab==='tx-don'?'text-red-500 border-b-2 border-red-500':'text-slate-400');
        document.getElementById('tab-btn-hoso').className = "flex-1 py-3 font-black " + (tab==='tx-hoso'?'text-red-500 border-b-2 border-red-500':'text-slate-400');
    }

    function adminCreateOrder() {
        const p = document.getElementById('ad-p').value, s = document.getElementById('ad-svc').value;
        const tu = document.getElementById('ad-tu-new').value, den = document.getElementById('ad-den-new').value;
        const dt = document.getElementById('ad-date').value, tm = document.getElementById('ad-time').value;
        if(!p || !s || !tu || !den || !dt || !tm) return alert("Nhập đủ thông tin Ngày/Giờ!");
        db.ref('orders').push({ khach: p, svc: s, tu: tu, den: den, date: dt, time: tm, ghiChuAdmin: document.getElementById('ad-note-new').value, status: 'cho' });
        alert("Đã tạo đơn thành công!");
    }

    function pushPrice(id) {
        const p = document.getElementById('price-'+id).value, n = document.getElementById('note-'+id).value;
        if(!p) return alert("Vui lòng nhập giá!");
        db.ref('orders/'+id).update({ gia: p, ghiChuAdmin: n, status: 'da' }).then(()=>alert("Đã đẩy giá!"));
    }

    function viewInfo(phone) {
        db.ref('users/'+phone).once('value', s => {
            const u = s.val(); if(!u) return;
            alert(`HỒ SƠ TÀI XẾ: ${phone}\n- Tên: ${u.ten || 'Chưa có'}\n- Bằng lái: ${u.bl || 'Trống'}\n- Ảnh xe: ${u.ax || 'Trống'}\n- Cà vẹt: ${u.cv || 'Trống'}`);
        });
    }

    function deleteUser(p) { if(confirm("Xóa tài khoản này?")) db.ref('users/'+p).remove(); }
    function toggleDiv(id) { document.getElementById(id).classList.toggle('hidden'); }
    function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function saveSession(p, r) { localStorage.setItem('klg_u', JSON.stringify({p, r})); location.reload(); }
    function logout() { localStorage.removeItem('klg_u'); location.reload(); }

    window.onload = () => { 
        const u=localStorage.getItem('klg_u'); 
        if(u){ 
            const j=JSON.parse(u); 
            if(j.r==='admin') { showPage('admin-page'); loadAdmin(); }
            else { showPage('taixe-page'); loadTaixe(j.p); }
        } 
    };
</script>
</body>
</html>
