<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XP-DRIVER - TÀI XẾ XÀ PHIÊN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        .page { display: none; } .active { display: block; }
        .tab-btn.active { border-bottom: 2px solid #22c55e; color: #22c55e; }
    </style>
</head>
<body class="bg-[#1a1c2e] text-slate-200 font-sans text-[10px]">

    <div id="login-page" class="page p-6 active">
        <div class="max-w-md mx-auto bg-[#242745] rounded-3xl mt-10 overflow-hidden border border-slate-700 shadow-2xl">
            <div class="bg-green-600 p-8 text-center font-black text-4xl italic text-white">XP-DRIVER</div>
            <div id="login-form" class="p-8 space-y-4">
                <input id="phone" type="number" placeholder="Số điện thoại" class="w-full bg-[#1a1c2e] p-4 rounded-xl border border-slate-600 outline-none text-white text-base">
                <input id="pass" type="password" placeholder="Mật khẩu" class="w-full bg-[#1a1c2e] p-4 rounded-xl border border-slate-600 outline-none text-white text-base">
                <button onclick="handleLogin()" class="w-full bg-green-600 py-4 rounded-xl text-white font-black text-base uppercase shadow-lg">Đăng Nhập</button>
                <button onclick="toggleAuth('reg')" class="w-full text-slate-400 font-bold uppercase mt-2 text-center text-[10px]">Đăng ký tài xế mới</button>
            </div>
            <div id="reg-form" class="p-8 space-y-4 hidden">
                <h3 class="text-center font-black text-green-400 uppercase italic">Đăng ký đối tác XP</h3>
                <input id="r-phone" type="number" placeholder="SĐT đăng ký" class="w-full bg-[#1a1c2e] p-4 rounded-xl border border-slate-600 text-white text-base">
                <input id="r-pass" type="password" placeholder="Mật khẩu" class="w-full bg-[#1a1c2e] p-4 rounded-xl border border-slate-600 text-white text-base">
                <button onclick="handleRegister()" class="w-full bg-green-600 py-4 rounded-xl font-black uppercase text-base">Xác nhận đăng ký</button>
                <button onclick="toggleAuth('login')" class="w-full text-slate-500 text-center block uppercase">Quay lại</button>
            </div>
        </div>
    </div>

    <div id="admin-page" class="page p-4">
        <div class="flex justify-between items-center mb-4 border-b border-slate-700 pb-2">
            <span class="text-yellow-400 font-black uppercase text-sm italic font-black">QUẢN TRỊ VIÊN</span>
            <button onclick="logout()" class="text-red-400 border border-red-400 px-3 py-1 rounded font-bold uppercase">Thoát</button>
        </div>
        <div class="grid grid-cols-1 gap-4 mb-4">
            <div class="bg-blue-900/20 p-4 rounded-xl border border-blue-500/30 space-y-2 text-center">
                <h3 class="text-blue-400 font-black uppercase mb-2 text-left text-[10px]">💰 NẠP TIỀN CHO TÀI XẾ</h3>
                <button onclick="napTienTX()" class="w-full bg-blue-600 py-3 rounded-xl font-black uppercase text-xs shadow-lg">BẤM VÀO ĐỂ NẠP TIỀN</button>
            </div>
        </div>
        <div class="space-y-4">
            <section><h3 class="text-green-400 font-black mb-2 uppercase italic text-[10px]">📂 Danh sách Tài xế</h3><div id="ad-tx-list"></div></section>
            <section><h3 class="text-orange-400 font-black mb-2 uppercase italic text-[10px]">🔔 Đơn đang chờ báo giá</h3><div id="ad-ord-list"></div></section>
        </div>
    </div>

    <div id="taixe-page" class="page p-4">
        <div class="flex justify-between items-center mb-4 border-b border-slate-700 pb-2">
            <span class="text-green-500 font-black uppercase text-sm italic font-black">BÁC TÀI XÀ PHIÊN</span>
            <button onclick="logout()" class="text-red-400 border border-red-400 px-2 py-1 rounded font-bold uppercase text-[8px]">Thoát</button>
        </div>
        
        <div class="bg-slate-800 p-4 rounded-2xl mb-4 text-center border border-slate-600 shadow-xl">
            <span class="text-[10px] text-slate-400 uppercase">Ví của tôi hiện tại:</span> 
            <div id="tx-so-du" class="text-yellow-400 font-black text-2xl">0K</div>
        </div>

        <div class="flex border-b border-slate-700 mb-4 text-center font-bold">
            <button onclick="showTxTab('tx-orders')" id="tab-o" class="flex-1 py-2 tab-btn active uppercase">Đơn Hàng</button>
            <button onclick="showTxTab('tx-profile')" id="tab-p" class="flex-1 py-2 tab-btn uppercase">Hồ Sơ Của Tôi</button>
        </div>

        <div id="tx-orders" class="space-y-3"><div id="tx-list"></div></div>

        <div id="tx-profile" class="hidden space-y-4">
            <div class="bg-[#242745] p-4 rounded-xl border border-slate-700 space-y-3">
                <h4 class="text-yellow-500 font-bold uppercase italic text-[10px]">Thông tin của tôi</h4>
                <input id="profile-name" type="text" placeholder="Họ tên sếp tài" class="w-full bg-[#1a1c2e] p-3 rounded-lg border border-slate-600 text-white outline-none">
                <input id="profile-license" type="text" placeholder="Link ảnh bằng lái" class="w-full bg-[#1a1c2e] p-3 rounded-lg border border-slate-600 text-white outline-none">
                <button onclick="updateProfile()" class="w-full bg-green-600 py-3 rounded-xl font-black uppercase">LƯU HỒ SƠ</button>
            </div>
        </div>
    </div>

<script>
    // PHẦN CẤU HÌNH FIREBASE CỦA SẾP
    const firebaseConfig = {
        apiKey: "AIzaSyA7D06JXpU4zFnT2pYpbuZlw-YCb8F8VpQ",
        authDomain: "khaly-go-23798.firebaseapp.com",
        databaseURL: "https://khaly-go-23798-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "khaly-go-23798",
        storageBucket: "khaly-go-23798.firebasestorage.app",
        messagingSenderId: "328254923276",
        appId: "1:328254923276:web:625f6be13a31b0a9264429"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // HÀM ĐĂNG NHẬP (Giữ nguyên tài khoản admin của sếp)
    function handleLogin() {
        const p = document.getElementById('phone').value, mk = document.getElementById('pass').value;
        if (p === "0789454369" && mk === "19861990LyVinh@") return saveSession(p, 'admin');
        db.ref('users/' + p).once('value', s => {
            const u = s.val();
            if (u && u.pass === mk && u.role === 'taixe') saveSession(p, 'taixe');
            else alert("Sai số điện thoại hoặc mật khẩu!");
        });
    }

    function handleRegister() {
        const p = document.getElementById('r-phone').value, mk = document.getElementById('r-pass').value;
        if(p.length < 10) return alert("SĐT không hợp lệ!");
        db.ref('users/'+p).set({pass:mk, role:'taixe', soDu:0}).then(() => { 
            alert("Đăng ký thành công!"); saveSession(p, 'taixe');
        });
    }

    function saveSession(p, r) { localStorage.setItem('klg_u', JSON.stringify({p, r})); location.reload(); }
    function logout() { localStorage.removeItem('klg_u'); location.reload(); }

    // TÀI XẾ: LOAD ĐƠN VÀ THÊM TÍNH NĂNG MỚI
    function loadTaixe() {
        const uSes = JSON.parse(localStorage.getItem('klg_u'));
        db.ref('users/' + uSes.p).on('value', s => { 
            document.getElementById('tx-so-du').innerText = (s.val().soDu || 0) + "K"; 
        });

        db.ref('orders').on('value', s => {
            let h = ""; s.forEach(o => { 
                const d = o.val(); 
                if(d.status === 'da' || (d.status === 'da_nhan' && d.taiXe === uSes.p)) {
                    const isMine = (d.status === 'da_nhan');
                    h += `<div class="bg-[#242745] p-4 rounded-xl border border-slate-700 mb-3 shadow-lg">
                        <div class="flex justify-between items-center mb-2 text-white">
                            <span class="bg-red-600 px-2 py-0.5 rounded text-[8px] font-black italic uppercase">${d.svc}</span>
                            <span>⏰ ${d.gio || '---'}</span>
                        </div>
                        <div class="my-2 p-2 bg-slate-900/50 rounded-lg">
                            <p>📍 Đón: <span class="font-bold text-white">${d.tu}</span></p>
                            <p>🏁 Đến: <span class="font-bold text-white">${d.den}</span></p>
                        </div>
                        <p class="text-green-400 font-black text-sm italic">Giá: ${d.gia}K</p>

                        ${!isMine ? 
                            `<button onclick="txNhanDon('${o.key}', ${d.gia})" class="w-full bg-blue-600 mt-3 py-3 rounded-xl font-black uppercase text-[10px]">Bấm Để Nhận Đơn (Phí 12%)</button>` 
                            : 
                            `<div class="mt-3 space-y-2">
                                <div class="bg-green-700/20 border border-green-500/50 p-2 rounded-lg text-center text-green-400">
                                    <p class="font-bold uppercase italic">Bạn đã nhận đơn này</p>
                                    <a href="tel:${d.khach}" class="text-blue-400 font-black text-sm underline block mt-1 italic">📞 Bấm Để Gọi Khách: ${d.khach}</a>
                                </div>
                                <button onclick="if(confirm('Chuyến đi đã hoàn thành?')) db.ref('orders/${o.key}').update({status: 'hoan_thanh'})" 
                                        class="w-full bg-orange-600 py-3 rounded-xl font-black uppercase text-[10px] text-white shadow-lg">
                                    ✅ HOÀN THÀNH CHUYẾN
                                </button>
                            </div>`
                        }
                    </div>`;
                }
            });
            document.getElementById('tx-list').innerHTML = h || "<p class='text-center py-10 opacity-50 italic uppercase'>Đang đợi đơn từ sếp...</p>";
        });
    }

    function txNhanDon(id, gia) {
        const u = JSON.parse(localStorage.getItem('klg_u')), phi = Math.round(gia * 0.12);
        db.ref('users/'+u.p).once('value', s => {
            const sd = s.val().soDu || 0;
            if(sd < phi) return alert("Ví không đủ tiền để nhận đơn! Sếp hãy nạp thêm.");
            if(confirm("Nhận đơn này sếp sẽ mất " + phi + "K phí?")) {
                db.ref('users/'+u.p).update({soDu: sd - phi});
                db.ref('orders/'+id).update({status: 'da_nhan', taiXe: u.p});
            }
        });
    }

    // ADMIN: TÍNH NĂNG CŨ CỦA SẾP
    function loadAdmin() {
        db.ref('orders').on('value', s => {
            let h = ""; s.forEach(o => { 
                const d = o.val(); 
                if(d.status === 'cho' || d.status === 'da') {
                    h += `<div class="bg-[#242745] p-3 rounded-lg border-l-4 border-yellow-500 mb-2">
                        <p class="text-blue-400 font-bold uppercase">Khách: ${d.khach}</p>
                        <p class="text-[9px] opacity-70">${d.tu} → ${d.den}</p>
                        <div class="flex gap-2 mt-2">
                            <input id="g-${o.key}" type="number" value="${d.gia||''}" class="w-20 text-black p-1 rounded font-bold" placeholder="Giá K">
                            <button onclick="db.ref('orders/${o.key}').update({gia:document.getElementById('g-${o.key}').value, status:'da'})" class="bg-green-600 px-4 rounded font-bold uppercase">Báo Giá</button>
                            <button onclick="if(confirm('Xóa đơn?')) db.ref('orders/${o.key}').remove()" class="text-red-500 ml-auto font-bold uppercase underline">Xóa</button>
                        </div>
                    </div>`;
                }
            });
            document.getElementById('ad-ord-list').innerHTML = h || "Chưa có đơn mới.";
        });
        db.ref('users').on('value', s => {
            let hTx=""; s.forEach(u => {
                const ud=u.val(); 
                if(ud.role==='taixe') hTx += `<div class="flex justify-between p-2 border-b border-slate-700"><span>${u.key} (Ví: <b class='text-yellow-400'>${ud.soDu}K</b>)</span><button onclick="if(confirm('Xóa tài xế này?')) db.ref('users/${u.key}').remove()" class="text-red-500 font-bold">XÓA</button></div>`;
            });    
            document.getElementById('ad-tx-list').innerHTML = hTx || "Chưa có tài xế.";
        });
    }

    function napTienTX() {
        const p = prompt("Nhập số điện thoại tài xế:"), v = prompt("Nhập số tiền cần nạp (K):");
        if(p && v) { 
            db.ref('users/'+p).once('value', s => { 
                if(s.exists()) {
                    db.ref('users/'+p).update({soDu: (s.val().soDu || 0) + parseInt(v)}); 
                    alert("Đã nạp thành công " + v + "K cho sếp tài!"); 
                } else alert("SĐT này chưa đăng ký tài xế!");
            }); 
        }
    }

    function toggleAuth(t) { document.getElementById('login-form').classList.toggle('hidden', t==='reg'); document.getElementById('reg-form').classList.toggle('hidden', t==='login'); }
    function showTxTab(id) {
        document.getElementById('tx-orders').classList.toggle('hidden', id==='tx-profile');
        document.getElementById('tx-profile').classList.toggle('hidden', id==='tx-orders');
        document.getElementById('tab-o').classList.toggle('active', id==='tx-orders');
        document.getElementById('tab-p').classList.toggle('active', id==='tx-profile');
    }
    function updateProfile() {
        const u=JSON.parse(localStorage.getItem('klg_u')), n=document.getElementById('profile-name').value, l=document.getElementById('profile-license').value;
        db.ref('users/'+u.p).update({ten:n, banglai:l}).then(()=>alert("Đã lưu thông tin!"));
    }

    window.onload = () => { 
        const u=localStorage.getItem('klg_u'); 
        if(u){ 
            const j=JSON.parse(u); 
            document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); 
            const pg = document.getElementById(j.r+'-page');
            if(pg) pg.classList.add('active'); 
            if(j.r==='admin') loadAdmin(); if(j.r==='taixe') loadTaixe();
        } 
    };
</script>
</body>
</html>
