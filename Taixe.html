<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XP-DRIVER - TÀI XẾ XÀ PHIÊN</title>
    
    <style>
        /* MÃ LỆNH ƯU TIÊN HIỂN THỊ - CHỐNG ĐEN MÀN HÌNH */
        body { background-color: #1a1c2e !important; color: white !important; margin: 0; font-family: sans-serif; }
        .page { display: none; padding: 20px; box-sizing: border-box; min-height: 100vh; }
        .active { display: block !important; }
        .khung-chinh { background: #242745; border-radius: 20px; border: 1px solid #334155; padding: 25px; margin-top: 40px; text-align: center; }
        .logo-app { background: #16a34a; padding: 15px; border-radius: 10px; font-weight: 900; font-size: 24px; font-style: italic; margin-bottom: 20px; color: white; }
        .input-xinh { width: 100%; background: #1a1c2e; border: 1px solid #475569; padding: 12px; border-radius: 10px; color: white; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        .nut-bam { background: #16a34a; color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .the-don { background: #242745; border: 1px solid #334155; border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .tab-cai-dat { display: flex; border-bottom: 1px solid #334155; margin-bottom: 15px; }
        .tab-nut { flex: 1; padding: 10px; text-align: center; font-size: 11px; font-weight: bold; cursor: pointer; color: #64748b; }
        .tab-nut.active { color: #22c55e; border-bottom: 2px solid #22c55e; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div id="login-page" class="page active">
        <div class="khung-chinh">
            <div class="logo-app">XP-DRIVER</div>
            <div id="login-form">
                <input id="phone" type="number" class="input-xinh" placeholder="Số điện thoại">
                <input id="pass" type="password" class="input-xinh" placeholder="Mật khẩu">
                <button onclick="handleLogin()" class="nut-bam">ĐĂNG NHẬP</button>
                <p onclick="toggleAuth('reg')" style="color:#94a3b8; font-size:12px; margin-top:15px; cursor:pointer; font-weight:bold;">ĐĂNG KÝ TÀI XẾ MỚI</p>
            </div>
            <div id="reg-form" style="display: none;">
                <h3 style="color:#4ade80;">ĐĂNG KÝ ĐỐI TÁC</h3>
                <input id="r-phone" type="number" class="input-xinh" placeholder="SĐT đăng ký">
                <input id="r-pass" type="password" class="input-xinh" placeholder="Mật khẩu">
                <button onclick="handleRegister()" class="nut-bam">XÁC NHẬN ĐĂNG KÝ</button>
                <p onclick="toggleAuth('login')" style="color:#94a3b8; margin-top:15px; cursor:pointer;">QUAY LẠI</p>
            </div>
        </div>
    </div>

    <div id="admin-page" class="page">
        <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #334155; padding-bottom: 10px;">
            <span style="color:#facc15; font-weight: bold;">QUẢN TRỊ VIÊN</span>
            <button onclick="logout()" style="color:#f87171; background:none; border:1px solid #f87171; border-radius:5px; padding:2px 10px;">Thoát</button>
        </div>
        <div class="khung-chinh" style="margin-top:20px; padding:15px;">
            <h4 style="color:#60a5fa; font-size:10px; text-align:left;">💰 NẠP TIỀN CHO TÀI XẾ</h4>
            <button onclick="napTienTX()" style="background:#2563eb; color:white; border:none; width:100%; padding:12px; border-radius:10px; font-weight:bold;">BẤM VÀO ĐỂ NẠP TIỀN</button>
        </div>
        <div id="ad-tx-list" style="margin-top:20px;"></div>
        <div id="ad-ord-list" style="margin-top:20px;"></div>
    </div>

    <div id="taixe-page" class="page">
        <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #334155; padding-bottom: 10px;">
            <span style="color:#22c55e; font-weight: bold;">BÁC TÀI XÀ PHIÊN</span>
            <button onclick="logout()" style="color:#f87171; background:none; border:1px solid #f87171; padding:2px 8px; font-size:10px; border-radius:4px;">Thoát</button>
        </div>
        <div style="background:#1e293b; padding:15px; border-radius:20px; text-align:center; border:1px solid #475569; margin: 15px 0;">
            <div style="font-size:10px; color:#94a3b8;">VÍ HIỆN TẠI</div>
            <div id="tx-so-du" style="color:#facc15; font-size:28px; font-weight:bold;">0K</div>
        </div>
        <div class="tab-cai-dat">
            <div onclick="showTxTab('tx-orders')" id="tab-o" class="tab-nut active">ĐƠN HÀNG</div>
            <div onclick="showTxTab('tx-profile')" id="tab-p" class="tab-nut">HỒ SƠ</div>
        </div>
        <div id="tx-orders"><div id="tx-list"></div></div>
        <div id="tx-profile" style="display:none;">
            <div class="khung-chinh" style="margin-top:0;">
                <input id="profile-name" type="text" class="input-xinh" placeholder="Họ tên sếp">
                <button onclick="updateProfile()" class="nut-bam">LƯU HỒ SƠ</button>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA7D06JXpU4zFnT2pYpbuZlw-YCb8F8VpQ",
        authDomain: "khaly-go-23798.firebaseapp.com",
        databaseURL: "https://khaly-go-23798-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "khaly-go-23798",
        storageBucket: "khaly-go-23798.firebasestorage.app",
        messagingSenderId: "328254923276",
        appId: "1:328254923276:web:625f6be13a31b0a9264429"
    };

    function startApp() {
        if (typeof firebase !== 'undefined') {
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            window.db = firebase.database();
            
            const u = localStorage.getItem('klg_u');
            if(u) {
                const j = JSON.parse(u);
                chuyenTrang(j.r + '-page');
                if(j.r === 'admin') loadAdmin();
                if(j.r === 'taixe') loadTaixe();
            }
        }
    }

    function chuyenTrang(id) {
        const p = document.getElementsByClassName('page');
        for(let i=0; i<p.length; i++) p[i].classList.remove('active');
        document.getElementById(id).classList.add('active');
    }

    function handleLogin() {
        if (!window.db) return alert("Đang kết nối hệ thống...");
        
        let p = document.getElementById('phone').value.trim();
        let mk = document.getElementById('pass').value.trim();
        
        if(!p || !mk) return alert("Sếp nhập đủ SĐT và Mật khẩu nhé!");

        // ADMIN ĐẶC BIỆT
        if (p === "0789454369" && mk === "19861990LyVinh@") return saveSession(p, 'admin');
        
        // KIỂM TRA TẤT CẢ TÀI KHOẢN TRÊN FIREBASE
        db.ref('users/' + p).once('value', s => {
            const u = s.val();
            // So sánh mật khẩu (chuyển cả 2 về chuỗi để chắc chắn)
            if (u && String(u.pass) === String(mk)) {
                saveSession(p, u.role || 'taixe');
            } else {
                alert("SĐT hoặc Mật khẩu không đúng sếp ơi!");
            }
        }, err => {
            alert("Lỗi kết nối mạng rồi sếp!");
        });
    }

    function handleRegister() {
        const p = document.getElementById('r-phone').value.trim(), mk = document.getElementById('r-pass').value.trim();
        if(!p || !mk) return alert("Nhập đủ tin sếp ơi!");
        db.ref('users/'+p).set({pass:mk, role:'taixe', soDu:0}).then(() => { 
            alert("Đăng ký thành công!"); saveSession(p, 'taixe');
        });
    }

    function saveSession(p, r) { localStorage.setItem('klg_u', JSON.stringify({p, r})); location.reload(); }
    function logout() { localStorage.removeItem('klg_u'); location.reload(); }

    function loadTaixe() {
        const uSes = JSON.parse(localStorage.getItem('klg_u'));
        db.ref('users/' + uSes.p).on('value', s => { 
            if(s.exists()) document.getElementById('tx-so-du').innerText = (s.val().soDu || 0) + "K"; 
        });
        db.ref('orders').on('value', s => {
            let h = ""; s.forEach(o => { 
                const d = o.val(); 
                if(d.status === 'da' || (d.status === 'da_nhan' && d.taiXe === uSes.p)) {
                    const isMine = (d.status === 'da_nhan');
                    h += `<div class="the-don">
                        <p style="font-size:12px; margin:5px 0;">📍 ${d.tu} <br> 🏁 ${d.den}</p>
                        <p style="color:#4ade80; font-weight:bold;">Giá: ${d.gia}K</p>
                        ${!isMine ? `<button onclick="txNhanDon('${o.key}', ${d.gia})" class="nut-bam" style="padding:10px; font-size:12px;">NHẬN ĐƠN</button>` : 
                        `<div style="margin-top:10px;">
                            <a href="tel:${d.khach}" style="display:block; text-align:center; padding:10px; border:1px solid #22c55e; color:#60a5fa; text-decoration:none; margin-bottom:8px; border-radius:10px;">📞 GỌI KHÁCH</a>
                            <button onclick="if(confirm('Xong chuyến?')) db.ref('orders/${o.key}').update({status: 'hoan_thanh'})" class="nut-bam" style="background:#ea580c;">✅ HOÀN THÀNH</button>
                        </div>`}
                    </div>`;
                }
            });
            document.getElementById('tx-list').innerHTML = h || "<p style='text-align:center; opacity:0.5;'>Đợi đơn mới...</p>";
        });
    }

    function txNhanDon(id, gia) {
        const u = JSON.parse(localStorage.getItem('klg_u')), phi = Math.round(gia * 0.12);
        db.ref('users/'+u.p).once('value', s => {
            const sd = s.val().soDu || 0;
            if(sd < phi) return alert("Ví không đủ tiền!");
            db.ref('users/'+u.p).update({soDu: sd - phi});
            db.ref('orders/'+id).update({status: 'da_nhan', taiXe: u.p});
        });
    }

    function loadAdmin() {
        db.ref('orders').on('value', s => {
            let h = ""; s.forEach(o => { 
                const d = o.val(); if(d.status === 'cho' || d.status === 'da') {
                    h += `<div class="the-don" style="border-left: 4px solid #facc15; text-align:left;">
                        <p style="font-size:11px;"><b>Khách:</b> ${d.khach}</p>
                        <input id="g-${o.key}" type="number" value="${d.gia||''}" style="width:60px; color:black; padding:5px; border-radius:5px;" placeholder="K">
                        <button onclick="db.ref('orders/${o.key}').update({gia:document.getElementById('g-${o.key}').value, status:'da'})" style="background:#16a34a; color:white; border:none; padding:5px 10px; border-radius:5px;">BÁO GIÁ</button>
                    </div>`;
                }
            });
            document.getElementById('ad-ord-list').innerHTML = h;
        });
        db.ref('users').on('value', s => {
            let hTx=""; s.forEach(u => {
                const ud=u.val(); if(ud.role==='taixe') hTx += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #334155; font-size:11px;"><span>${u.key} (Ví: <b>${ud.soDu}K</b>)</span><button onclick="if(confirm('Xóa?')) db.ref('users/${u.key}').remove()" style="color:#ef4444; background:none; border:none;">XÓA</button></div>`;
            });    
            document.getElementById('ad-tx-list').innerHTML = hTx;
        });
    }

    function napTienTX() {
        const p = prompt("SĐT tài xế:"), v = prompt("Tiền nạp (K):");
        if(p && v) { 
            db.ref('users/'+p).once('value', s => { 
                if(s.exists()) { db.ref('users/'+p).update({soDu: (s.val().soDu || 0) + parseInt(v)}); alert("Đã nạp!"); }
            }); 
        }
    }

    function showTxTab(id) {
        document.getElementById('tx-orders').style.display = (id==='tx-profile' ? 'none' : 'block');
        document.getElementById('tx-profile').style.display = (id==='tx-orders' ? 'none' : 'block');
        document.getElementById('tab-o').classList.toggle('active', id==='tx-orders');
        document.getElementById('tab-p').classList.toggle('active', id==='tx-profile');
    }
    
    function toggleAuth(t) { 
        document.getElementById('login-form').style.display = (t==='reg' ? 'none' : 'block'); 
        document.getElementById('reg-form').style.display = (t==='reg' ? 'block' : 'none'); 
    }

    window.onload = startApp;
    setTimeout(startApp, 1500);
</script>
</body>
</html>
