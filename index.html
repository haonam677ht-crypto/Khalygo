<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KhaLy GO - KLG</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #d32f2f; --blue: #1a73e8; --green: #28a745; --gray: #f4f7f6; }
        html, body { overscroll-behavior-y: contain; overflow: hidden; height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: #fff; }
        .container { width: 100%; max-width: 450px; height: 100%; margin: auto; display: flex; flex-direction: column; position: relative; }
        
        /* BỎ PHẦN ĐEN - THAY BẰNG HEADER NHỎ GỌN HOẶC ẨN LUÔN */
        .main-header { padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; background: #fff; border-bottom: 1px solid #eee; }
        .logo-small { width: 40px; height: 40px; border-radius: 8px; }

        .content { padding: 15px; flex: 1; overflow-y: auto; }
        .red-banner { background: var(--primary); padding: 40px 20px; color: white; text-align: center; border-radius: 0 0 40px 40px; margin-bottom: 25px; }
        .red-banner h1 { margin: 0; font-size: 45px; font-weight: 800; letter-spacing: 2px; }

        input, select { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; outline: none; background: var(--gray); }
        button { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-red { background: var(--primary); color: white; text-transform: uppercase; }
        .btn-logout { background: #eee; color: #666; width: auto; padding: 6px 12px; font-size: 12px; border-radius: 6px; }

        .card { background: white; border-radius: 16px; padding: 18px; margin-bottom: 15px; border: 1px solid #eee; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .grid-services { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .service-item { background: #fff; border: 1px solid #f0f0f0; padding: 20px; border-radius: 16px; text-align: center; }
        
        .hidden { display: none !important; }
        .bottom-nav { height: 75px; background: white; border-top: 1px solid #eee; display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { text-align: center; color: #bbb; font-size: 11px; flex: 1; }
        .nav-item.active { color: var(--blue); }
    </style>
</head>
<body onload="initApp()">

<div class="container">
    <div id="scr-auth" class="hidden">
        <div class="red-banner">
            <h1>KLG</h1>
            <p>Hệ thống vận tải 4.0</p>
        </div>
        <div class="content">
            <div id="box-login">
                <input type="number" id="l-sdt" placeholder="Số điện thoại (10 số)">
                <input type="password" id="l-pass" placeholder="Mật khẩu">
                <button class="btn-red" onclick="handleLogin()">ĐĂNG NHẬP</button>
                <p onclick="toggleAuth(true)" style="text-align:center; color:var(--blue); margin-top:25px; cursor:pointer; font-weight:500;">Chưa có tài khoản? Đăng ký ngay</p>
            </div>
            
            <div id="box-reg" class="hidden">
                <p style="text-align:center; font-weight:bold; margin-bottom:15px;">ĐĂNG KÝ THÀNH VIÊN</p>
                <input type="number" id="r-sdt" placeholder="SĐT mới">
                <input type="password" id="r-pass" placeholder="Mật khẩu">
                <select id="r-role">
                    <option value="kh">Khách hàng</option>
                    <option value="tx">Tài xế</option>
                </select>
                <button class="btn-red" onclick="handleRegister()">TẠO TÀI KHOẢN</button>
                <p onclick="toggleAuth(false)" style="text-align:center; margin-top:20px; cursor:pointer;">Quay lại đăng nhập</p>
            </div>
        </div>
    </div>

    <div id="app-header" class="main-header hidden">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR6A6B7Nn-G-T7T1N3l3o8GqX7z6r6O7X-zWg&s" class="logo-small">
        <span id="header-title" style="font-weight:bold; color:var(--primary);">KhaLy GO</span>
        <button class="btn-logout" onclick="logout()">Thoát</button>
    </div>

    <div id="main-content" style="flex:1; display:flex; flex-direction:column;">
        </div>
</div>

<script>
    // Cấu hình Firebase
    const firebaseConfig = { databaseURL: "https://khaly-go-23798-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function initApp() {
        const session = localStorage.getItem('klg_session');
        if(session) {
            const user = JSON.parse(session);
            document.getElementById('app-header').classList.remove('hidden');
            // Logic hiển thị theo vai trò (Admin/Khách/TX)
        } else {
            document.getElementById('scr-auth').classList.remove('hidden');
        }
    }

    function handleLogin() {
        const s = document.getElementById('l-sdt').value, p = document.getElementById('l-pass').value;
        if(s === "0789454369" && p === "19861990LyVinh@") {
            saveSession(s, 'admin'); return;
        }
        db.ref('users/' + s).once('value', ss => {
            const u = ss.val();
            if(u && u.pass === p) saveSession(s, u.role);
            else alert("Sai thông tin đăng nhập!");
        });
    }

    function saveSession(s, r) {
        localStorage.setItem('klg_session', JSON.stringify({sdt:s, role:r}));
        location.reload();
    }

    function logout() { localStorage.clear(); location.reload(); }
    
    function toggleAuth(isReg) {
        document.getElementById('box-login').classList.toggle('hidden', isReg);
        document.getElementById('box-reg').classList.toggle('hidden', !isReg);
    }
</script>
</body>
</html>
