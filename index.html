<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhaLy GO - KLG</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #d32f2f; --blue: #1a73e8; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        .container { width: 100%; max-width: 450px; min-height: 100vh; background: white; margin: auto; position: relative; padding-bottom: 80px; }
        
        /* Giữ giao diện Header như ảnh sếp gửi */
        .header-top { background: #222; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .header-brand { font-size: 20px; font-weight: bold; }
        .red-bar { background: var(--primary); height: 50px; border-radius: 0 0 25px 25px; margin-bottom: 20px; }

        .content { padding: 15px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .btn-main { background: var(--primary); color: white; }
        .btn-blue { background: var(--blue); color: white; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        /* Bottom Nav giống ảnh sếp gửi */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; height: 65px; background: white; border-top: 1px solid #eee; display: flex; z-index: 100; }
        .nav-item { flex: 1; text-align: center; padding-top: 10px; color: #999; font-size: 12px; cursor: pointer; }
        .nav-item.active { color: var(--blue); }
        .hidden { display: none !important; }
    </style>
</head>
<body onload="kiemTraPhien()">

<div class="container">
    <div id="scr-auth">
        <div class="header-top"><span class="header-brand">KhaLy GO</span></div>
        <div class="red-bar"></div>
        <div class="content" style="text-align:center;">
            <h2 style="color:#333;">KLG</h2>
            <p style="color:#666; font-size:14px;">Hệ thống vận tải 4.0</p>
            <input type="number" id="auth-sdt" placeholder="Số điện thoại">
            <input type="password" id="auth-pass" placeholder="Mật khẩu">
            <button class="btn-main" onclick="xuLyAuth()">VÀO HỆ THỐNG</button>
            <p onclick="toggleReg()" id="toggle-text" style="color:var(--blue); margin-top:20px; cursor:pointer;">Chưa có tài khoản? Đăng ký</p>
        </div>
    </div>

    <div id="scr-tx" class="hidden">
        <div class="header-top"><span class="header-brand">KhaLy GO</span></div>
        <div class="content">
            <div class="card" style="text-align:center;">
                <div style="display:flex; justify-content:space-around;">
                    <div><small>Đã nạp</small><br><b id="tx-nap">0K</b></div>
                    <div><small>Phí</small><br><b id="tx-phi">0K</b></div>
                    <div><small>Số dư</small><br><b id="tx-du" style="color:var(--blue);">0K</b></div>
                </div>
            </div>

            <div id="tx-view-cuoc">
                <p><b>CUỐC XE ĐANG CHỜ</b></p>
                <div id="list-cuoc-moi"></div>
                <div id="cuoc-dang-chay" class="hidden">
                    <div class="card" style="border-left:5px solid green;">
                        <p style="color:green; font-weight:bold;">ĐANG THỰC HIỆN</p>
                        <div id="ct-cuoc"></div>
                        <button class="btn-main" onclick="txHoanThanh()">HOÀN THÀNH (HỐI SẾP TRẢ LƯƠNG)</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="bottom-nav">
            <div class="nav-item active"><i class="fa fa-car"></i><br>Cuốc xe</div>
            <div class="nav-item" onclick="alert('Nạp tiền: Chuyển khoản QR cho Sếp')"><i class="fa fa-wallet"></i><br>Tài khoản</div>
            <div class="nav-item" onclick="location.reload()"><i class="fa fa-sign-out-alt"></i><br>Thoát</div>
        </div>
    </div>

    <div id="scr-admin" class="hidden">
        <div class="header-top"><span class="header-brand">KLG - ADMIN</span></div>
        <div class="content">
            <button class="btn-blue" onclick="showFormTao()">+ TỰ TẠO ĐƠN MỚI</button>
            
            <div id="form-tao-don" class="hidden card" style="margin-top:10px;">
                <input type="number" id="ad-sdt-k" placeholder="SĐT Khách">
                <input type="text" id="ad-tu" placeholder="Điểm đón">
                <input type="text" id="ad-den" placeholder="Điểm đến">
                <input type="number" id="ad-gia" placeholder="Giá thu khách (Vd: 500)">
                <button class="btn-main" onclick="adPhatDon()">PHÁT ĐƠN NGAY</button>
            </div>

            <p><b>ĐƠN CHỜ TRẢ LƯƠNG (80%)</b></p>
            <div id="list-tra-luong"></div>
        </div>
    </div>
</div>

<script>
    // --- CẤU HÌNH ---
    const firebaseConfig = { databaseURL: "https://khaly-go-23798-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const SDT_ADMIN = "0789454369"; // Số của sếp

    function xuLyAuth() {
        const sdt = document.getElementById('auth-sdt').value;
        const pass = document.getElementById('auth-pass').value;
        if(!sdt || !pass) return alert("Nhập đủ SĐT và Mật khẩu sếp ơi!");

        db.ref('users/' + sdt).once('value', s => {
            const u = s.val();
            if(!u) { // Đăng ký mới nếu chưa có
                db.ref('users/' + sdt).set({pass:pass, soDu:0, role: (sdt===SDT_ADMIN?'admin':'tx')});
                alert("Đã tạo tài khoản mới!");
                location.reload();
            } else {
                if(u.pass !== pass) return alert("Sai mật khẩu!");
                localStorage.setItem('klg_user', sdt);
                location.reload();
            }
        });
    }

    function kiemTraPhien() {
        const sdt = localStorage.getItem('klg_user');
        if(!sdt) return;
        document.getElementById('scr-auth').classList.add('hidden');
        if(sdt === SDT_ADMIN) hienAdmin(); else hienTX(sdt);
    }

    // --- LOGIC TÀI XẾ ---
    function hienTX(sdt) {
        document.getElementById('scr-tx').classList.remove('hidden');
        db.ref('users/' + sdt).on('value', s => {
            const v = s.val();
            document.getElementById('tx-du').innerText = (v.soDu || 0) + "K";
        });
        loadCuocTX(sdt);
    }

    function loadCuocTX(sdt) {
        db.ref('don_da_duyet').on('value', s => {
            let h = "";
            s.forEach(c => {
                const d = c.val();
                const phi = Math.round(d.gia * 0.2);
                h += `<div class="card">
                    <b style="color:red; font-size:18px;">${d.gia}K</b> (Phí: ${phi}K)<br>
                    📍 ${d.tu} ➔ ${d.den}<br>
                    <button class="btn-blue" onclick="txNhanDon('${c.key}', ${phi}, ${d.gia})">NHẬN ĐƠN (TRỪ ${phi}K VÍ)</button>
                </div>`;
            });
            document.getElementById('list-cuoc-moi').innerHTML = h || "Đang chờ sếp phát đơn...";
        });
    }

    function txNhanDon(id, phi, gia) {
        const sdt = localStorage.getItem('klg_user');
        db.ref('users/' + sdt).once('value', s => {
            const sd = s.val().soDu || 0;
            if(sd < phi) return alert("Ví không đủ tiền trừ phí 20%!");
            
            db.ref('users/' + sdt).update({soDu: sd - phi});
            db.ref('don_da_duyet/' + id).once('value', ss => {
                const data = ss.val(); data.tx = sdt;
                db.ref('don_dang_chay/' + sdt).set(data);
                db.ref('don_da_duyet/' + id).remove();
                location.reload();
            });
        });
    }

    // --- LOGIC ADMIN ---
    function hienAdmin() {
        document.getElementById('scr-admin').classList.remove('hidden');
        db.ref('don_hoan_thanh').on('value', s => {
            let h = "";
            s.forEach(c => {
                const d = c.val();
                const luong = Math.round(d.gia * 0.8);
                h += `<div class="card">
                    <b>TX ${d.tx} xong đơn ${d.gia}K</b><br>
                    <span style="color:red">Sếp trả lương: ${luong}K (80%)</span>
                    <button onclick="db.ref('don_hoan_thanh/${c.key}').remove()" style="background:#eee;">ĐÃ TRẢ LƯƠNG XONG</button>
                </div>`;
            });
            document.getElementById('list-tra-luong').innerHTML = h;
        });
    }

    function adPhatDon() {
        const k = document.getElementById('ad-sdt-k').value, t = document.getElementById('ad-tu').value,
              d = document.getElementById('ad-den').value, g = document.getElementById('ad-gia').value;
        db.ref('don_da_duyet').push({khach:k, tu:t, den:d, gia:g});
        alert("Đã phát đơn!");
        document.getElementById('form-tao-don').classList.add('hidden');
    }

    function showFormTao() { document.getElementById('form-tao-don').classList.toggle('hidden'); }
    function txHoanThanh() { /* Code gửi sang don_hoan_thanh tương tự bản trước */ }
    function toggleReg() { alert("Sếp chỉ cần nhập SĐT và Mật khẩu mới rồi bấm vào hệ thống là tự tạo tài khoản luôn!"); }
</script>
</body>
</html>
