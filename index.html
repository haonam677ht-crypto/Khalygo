<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhaLy GO - Bảo Mật</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #d32f2f; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        .container { width: 100%; max-width: 450px; margin: auto; min-height: 100vh; background: white; }
        .header-admin { background: var(--primary); color: white; padding: 40px 20px; text-align: center; border-radius: 0 0 40px 40px; margin-bottom: 20px; }
        .content { padding: 15px; }
        .admin-nav { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
        .nav-btn { background: #eee; padding: 10px 5px; border-radius: 8px; font-weight: bold; border:none; font-size: 12px; cursor: pointer; }
        .nav-btn.active { background: var(--primary); color: white; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 12px; border-left: 8px solid var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; }
        .btn-duyet { background: #28a745; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body onload="kiemTraPhien()">

<div class="container">
    <div id="scr-login">
        <div class="header-admin"><h1>KhaLy GO</h1><p>Đăng nhập để tiếp tục</p></div>
        <div class="content">
            <input type="number" id="login-sdt" placeholder="Số điện thoại">
            <input type="password" id="login-pass" placeholder="Mật khẩu">
            <button class="btn-main" onclick="xuLyDangNhap()">ĐĂNG NHẬP</button>
        </div>
    </div>

    <div id="scr-admin" class="hidden">
        <div class="header-admin"><h2>QUẢN TRỊ KHALY GO</h2></div>
        <div class="content">
            <div class="admin-nav">
                <button class="nav-btn active" id="tab-don" onclick="showTab('don')">ĐƠN</button>
                <button class="nav-btn" id="tab-khach" onclick="showTab('khach')">KHÁCH</button>
                <button class="nav-btn" id="tab-tx" onclick="showTab('tx')">TÀI XẾ</button>
                <button class="nav-btn" id="tab-gopy" onclick="showTab('gopy')">GÓP Ý</button>
            </div>
            <div id="main-view"></div>
            <button onclick="dangXuat()" style="width:100%; padding:15px; background:#666; color:white; border:none; border-radius:12px; margin-top:20px;">THOÁT ADMIN</button>
        </div>
    </div>

    <div id="scr-user" class="hidden">
        <div class="header-admin"><h3>KhaLy GO - Xin chào!</h3></div>
        <div class="content">
            <p id="user-info" style="text-align:center; font-weight:bold;"></p>
            <p style="text-align:center;">Bạn không có quyền truy cập Quản trị.</p>
            <button onclick="dangXuat()" style="width:100%; padding:15px; background:#666; color:white; border:none; border-radius:12px;">ĐĂNG XUẤT</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://khaly-go-23798-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const SO_SEP = "0789454369"; // CHỈ SỐ NÀY MỚI VÀO ĐƯỢC ADMIN

    function kiemTraPhien() {
        const d = localStorage.getItem('khaly_user');
        if (d) {
            const u = JSON.parse(d);
            if (u.sdt === SO_SEP) vaoAdmin();
            else vaoUser(u.sdt);
        }
    }

    function xuLyDangNhap() {
        const sdt = document.getElementById('login-sdt').value;
        const mk = document.getElementById('login-pass').value;
        
        db.ref('users/' + sdt).once('value', s => {
            const d = s.val();
            if (d && d.matKhau === mk) {
                localStorage.setItem('khaly_user', JSON.stringify({sdt: sdt}));
                if (sdt === SO_SEP) vaoAdmin();
                else vaoUser(sdt);
            } else alert("Sai số điện thoại hoặc mật khẩu!");
        });
    }

    function vaoAdmin() {
        document.getElementById('scr-login').classList.add('hidden');
        document.getElementById('scr-admin').classList.remove('hidden');
        showTab('don');
    }

    function vaoUser(sdt) {
        document.getElementById('scr-login').classList.add('hidden');
        document.getElementById('scr-user').classList.remove('hidden');
        document.getElementById('user-info').innerText = "SĐT: " + sdt;
    }

    function showTab(tab) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        const view = document.getElementById('main-view');
        
        if(tab === 'don') {
            db.ref('don_cho_duyet').on('value', s => {
                let h = "";
                s.forEach(c => {
                    const d = c.val();
                    h += `<div class="card">
                        <b>${d.loai || 'Bao xe'}</b><br>
                        <span style="color:green; font-weight:bold;">📞 ${d.khach}</span><br>
                        <span>📍 ${d.tu} ➔ ${d.den}</span><br>
                        <input type="text" id="gia-${c.key}" placeholder="Nhập giá chốt...">
                        <button class="btn-duyet" onclick="duyetDon('${c.key}')">DUYỆT ĐƠN</button>
                    </div>`;
                });
                view.innerHTML = h || "Chưa có đơn chờ.";
            });
        } else {
            view.innerHTML = "<p style='text-align:center'>Đang tải dữ liệu...</p>";
        }
    }

    function duyetDon(id) {
        const gia = document.getElementById('gia-'+id).value;
        if(!gia) return alert("Nhập giá đã sếp!");
        db.ref('don_cho_duyet/' + id).once('value', s => {
            let data = s.val(); data.gia = gia;
            db.ref('don_da_duyet').push(data).then(() => {
                db.ref('don_cho_duyet/' + id).remove();
                alert("Đã đẩy đơn!");
            });
        });
    }

    function dangXuat() {
        localStorage.removeItem('khaly_user');
        location.reload();
    }
</script>
</body>
</html>
