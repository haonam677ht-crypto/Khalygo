<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhaLy GO - Quản lý vận tải</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #d32f2f; --secondary: #28a745; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; min-height: 100vh; background: white; box-shadow: 0 0 15px rgba(0,0,0,0.1); position: relative; }
        .header { background: var(--primary); color: white; padding: 25px 20px; text-align: center; border-radius: 0 0 20px 20px; }
        .content { padding: 20px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 15px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .btn-main { background: var(--primary); color: white; }
        .btn-success { background: var(--secondary); color: white; }
        .btn-danger { background: #dc3545; color: white; padding: 8px; border-radius: 8px; font-size: 12px; width: auto; }
        .hidden { display: none !important; }
        .xe-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
        .xe-item { border: 2px solid #eee; border-radius: 15px; padding: 10px; text-align: center; cursor: pointer; background: #fff; }
        .xe-item img { width: 45px; height: 45px; }
        .xe-item.active { border-color: var(--primary); background: #fff5f5; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; border-left: 5px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-size: 14px; }
        .admin-nav { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .nav-btn { background: #eee; padding: 12px; border-radius: 8px; font-weight: bold; border:none; }
        .nav-btn.active { background: var(--primary); color: white; }
        .price-tag { color: #d32f2f; font-weight: bold; font-size: 16px; margin: 5px 0; }
    </style>
</head>
<body onload="kiemTraPhien()">

<div class="container">
    <div id="scr-login">
        <div class="header"><h1>KhaLy GO</h1><p>Vận tải Cần Thơ - Hậu Giang</p></div>
        <div class="content">
            <input type="number" id="login-sdt" placeholder="Số điện thoại">
            <input type="password" id="login-pass" placeholder="Mật khẩu">
            <button class="btn-main" onclick="xuLyDangNhap()">ĐĂNG NHẬP</button>
            <p onclick="openReg()" style="text-align:center; text-decoration:underline; cursor:pointer;">Đăng ký tài khoản</p>
            <div id="reg-box" class="hidden" style="display:flex; gap:10px;">
                <button style="font-size:11px;" onclick="dangKy('khach')">KHÁCH</button>
                <button style="font-size:11px;" onclick="dangKy('admin')">TÀI XẾ</button>
            </div>
        </div>
    </div>

    <div id="scr-main" class="hidden">
        <div class="header"><h3 id="u-welcome">Chào sếp!</h3></div>
        <div class="content">
            <div id="view-khach" class="hidden">
                <div class="xe-grid">
                    <div class="xe-item" onclick="setXe('Xe ôm', this)"><img src="https://cdn-icons-png.flaticon.com/512/713/713437.png"><br>Xe ôm</div>
                    <div class="xe-item" onclick="setXe('Bao xe', this)"><img src="https://cdn-icons-png.flaticon.com/512/3202/3202926.png"><br>Bao xe</div>
                </div>
                <div style="display:flex; gap:5px;">
                    <input type="date" id="u-ngay">
                    <input type="time" id="u-gio">
                </div>
                <input type="text" id="u-tu" placeholder="📍 Điểm đón">
                <input type="text" id="u-den" placeholder="🏁 Điểm đến">
                <button class="btn-success" onclick="khachGuiDon()">ĐẶT XE & NHẬN BÁO GIÁ</button>
            </div>

            <div id="view-tx-don" class="hidden">
                <p style="font-weight:bold;">ĐƠN HÀNG CÓ SẴN (ĐÃ CHỐT GIÁ):</p>
                <div id="list-don-tx"></div>
            </div>

            <button onclick="dangXuat()" style="margin-top:20px; background:#666; color:white;">ĐĂNG XUẤT</button>
        </div>
    </div>

    <div id="scr-admin" class="hidden">
        <div class="header"><h3>SẾP TỔNG DUYỆT ĐƠN</h3></div>
        <div class="content">
            <div class="admin-nav">
                <button class="nav-btn active" onclick="loadAd('cho')">CHỜ DUYỆT</button>
                <button class="nav-btn" onclick="loadAd('da')">ĐÃ DUYỆT</button>
            </div>
            <div id="admin-content"></div>
            <button onclick="dangXuat()" style="background:#666; color:white; margin-top:10px;">THOÁT</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://khaly-go-23798-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const SO_SEP = "0789454369";
    let curSdt = "", curXe = "";

    function kiemTraPhien() {
        const d = localStorage.getItem('khaly_user');
        if (d) { 
            const u = JSON.parse(d); curSdt = u.sdt;
            db.ref('users/' + curSdt).once('value', s => {
                const data = s.val();
                if(data) hienThi(data.vaiTro);
            });
        }
    }

    function hienThi(v) {
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
        if(curSdt === SO_SEP) { document.getElementById('scr-admin').classList.remove('hidden'); loadAd('cho'); return; }
        document.getElementById('scr-main').classList.remove('hidden');
        if(v === 'admin') {
            document.getElementById('view-tx-don').classList.remove('hidden');
            loadDonChoTX();
        } else {
            document.getElementById('view-khach').classList.remove('hidden');
        }
    }

    function xuLyDangNhap() {
        const sdt = document.getElementById('login-sdt').value, mk = document.getElementById('login-pass').value;
        db.ref('users/' + sdt).once('value', s => {
            const d = s.val();
            if(d && d.matKhau === mk) {
                curSdt = sdt;
                localStorage.setItem('khaly_user', JSON.stringify({sdt: sdt, vaiTro: d.vaiTro}));
                hienThi(d.vaiTro);
            } else alert("Sai thông tin!");
        });
    }

    function dangKy(role) {
        const sdt = document.getElementById('login-sdt').value, mk = document.getElementById('login-pass').value;
        db.ref('users/' + sdt).set({ matKhau: mk, vaiTro: role }).then(() => { alert("Xong!"); location.reload(); });
    }

    // KHÁCH GỬI ĐƠN - LƯU VÀO MỤC CHỜ DUYỆT
    function khachGuiDon() {
        const tu = document.getElementById('u-tu').value, den = document.getElementById('u-den').value;
        const ngay = document.getElementById('u-ngay').value, gio = document.getElementById('u-gio').value;
        if(!curXe || !tu || !ngay) return alert("Nhập đủ thông tin sếp ơi!");

        db.ref('don_cho_duyet').push({
            khach: curSdt, loai: curXe, tu: tu, den: den, ngay: ngay, gio: gio, status: 'cho_duyet'
        }).then(() => {
            alert("Đã gửi! Sếp Tổng sẽ gọi báo giá cho bạn ngay.");
            window.open(`https://zalo.me/${SO_SEP}?text=Tôi đặt xe ${curXe} ngày ${ngay}`, '_blank');
        });
    }

    // TÀI XẾ CHỈ THẤY ĐƠN ĐÃ DUYỆT
    function loadDonChoTX() {
        db.ref('don_da_duyet').on('value', s => {
            let h = "";
            s.forEach(c => {
                const d = c.val();
                h += `<div class="card">
                    <b style="color:green">ĐƠN ĐÃ CHỐT GIÁ</b><br>
                    <span class="price-tag">GIÁ: ${d.gia} VNĐ</span><br>
                    📞 <a href="tel:${d.khach}">${d.khach}</a> | 🚗 ${d.loai}<br>
                    📅 ${d.ngay} (${d.gio}) | 📍 ${d.tu} ➔ ${d.den}
                </div>`;
            });
            document.getElementById('list-don-tx').innerHTML = h || "Chưa có đơn hàng nào.";
        });
    }

    // ADMIN DUYỆT ĐƠN & NHẬP GIÁ
    function loadAd(tab) {
        const view = document.getElementById('admin-content');
        const path = (tab === 'cho') ? 'don_cho_duyet' : 'don_da_duyet';
        
        db.ref(path).on('value', s => {
            let h = "";
            s.forEach(c => {
                const d = c.val();
                if(tab === 'cho') {
                    h += `<div class="card">
                        <b>Khách: ${d.khach}</b> (${d.loai})<br>
                        📍 ${d.tu} -> ${d.den}<br>
                        <input type="text" id="gia-${c.key}" placeholder="Nhập giá chốt (VD: 500k)">
                        <button class="btn-success" onclick="duyetDon('${c.key}')">DUYỆT & ĐẨY LÊN</button>
                        <button class="btn-danger" onclick="db.ref('don_cho_duyet/${c.key}').remove()">XOÁ</button>
                    </div>`;
                } else {
                    h += `<div class="card">
                        <b>Đã duyệt - Giá: ${d.gia}</b><br>
                        Khách: ${d.khach} | ${d.ngay}<br>
                        <button class="btn-danger" onclick="db.ref('don_da_duyet/${c.key}').remove()">GỠ ĐƠN</button>
                    </div>`;
                }
            });
            view.innerHTML = h || "Trống";
        });
    }

    function duyetDon(id) {
        const gia = document.getElementById('gia-'+id).value;
        if(!gia) return alert("Sếp phải nhập giá mới duyệt được!");
        
        db.ref('don_cho_duyet/' + id).once('value', s => {
            const data = s.val();
            data.gia = gia; // Thêm giá vào đơn
            db.ref('don_da_duyet').push(data).then(() => {
                db.ref('don_cho_duyet/' + id).remove();
                alert("Đã đẩy đơn cho tài xế!");
            });
        });
    }

    function setXe(l, el) { curXe = l; document.querySelectorAll('.xe-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); }
    function dangXuat() { localStorage.removeItem('khaly_user'); location.reload(); }
    function openReg() { document.getElementById('reg-box').classList.toggle('hidden'); }
</script>
</body>
</html>
