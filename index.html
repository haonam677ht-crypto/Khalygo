<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhaLy GO - Uy Tín Trên Từng Cây Số</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #d32f2f; --secondary: #28a745; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; min-height: 100vh; background: white; box-shadow: 0 0 15px rgba(0,0,0,0.1); position: relative; }
        .header { background: var(--primary); color: white; padding: 25px 20px; text-align: center; border-radius: 0 0 20px 20px; }
        .content { padding: 20px; }
        input, textarea, select { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 15px; outline: none; }
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .btn-main { background: var(--primary); color: white; }
        .btn-success { background: var(--secondary); color: white; }
        .btn-danger { background: #dc3545; color: white; padding: 5px 10px; border-radius: 8px; font-size: 11px; width: auto; }
        .btn-view { background: #007bff; color: white; padding: 5px 8px; border-radius: 5px; font-size: 10px; text-decoration: none; margin-right: 5px; }
        .hidden { display: none !important; }
        .xe-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
        .xe-item { border: 2px solid #eee; border-radius: 15px; padding: 10px; text-align: center; cursor: pointer; background: #fff; }
        .xe-item img { width: 45px; height: 45px; margin-bottom: 5px; }
        .xe-item.active { border-color: var(--primary); background: #fff5f5; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; border-left: 5px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-size: 14px; display: block; position: relative; }
        .admin-nav { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 5px; margin-bottom: 15px; }
        .nav-btn { background: #eee; padding: 10px 2px; border-radius: 8px; font-size: 11px; font-weight: bold; border:none; }
        .nav-btn.active { background: var(--primary); color: white; }
        .call-link { text-decoration: none; color: #28a745; font-weight: bold; display: inline-flex; align-items: center; gap: 5px; }
        .time-tag { font-size: 11px; color: #888; display: block; margin-bottom: 5px; }
    </style>
</head>
<body onload="kiemTraPhien()">

<div class="container">
    <div id="scr-login">
        <div class="header"><h1>KhaLy GO</h1><p>Vận tải Cần Thơ - Hậu Giang</p></div>
        <div class="content">
            <input type="number" id="login-sdt" placeholder="Số điện thoại">
            <input type="password" id="login-pass" placeholder="Mật khẩu">
            <button class="btn-main" onclick="xuLyDangNhap()">ĐĂNG NHẬP</button>
            <div id="link-reg" style="text-align:center; margin-top:15px; font-size:14px; text-decoration:underline; cursor:pointer;" onclick="openReg()">Chưa có tài khoản? Đăng ký</div>
            <div id="reg-box" class="hidden">
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button style="flex:1; font-size:11px; padding:10px;" onclick="dangKy('khach')">ĐĂNG KÝ KHÁCH</button>
                    <button style="flex:1; font-size:11px; padding:10px;" onclick="dangKy('admin')">ĐĂNG KÝ TÀI XẾ</button>
                </div>
            </div>
            <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
            <a href="tel:0789454369" class="btn-success" style="text-decoration:none; display:flex; align-items:center; justify-content:center; gap:10px;">
                <i class="fa fa-headset"></i> LIÊN HỆ HỖ TRỢ SẾP TỔNG
            </a>
            <div style="text-align:center; margin-top:15px; font-size:12px; color:var(--primary); font-weight:bold;">KhaLy GO - Uy tín trên từng cây số</div>
        </div>
    </div>

    <div id="scr-tx-cho" class="hidden">
        <div class="header"><h3>HỒ SƠ TÀI XẾ</h3></div>
        <div class="content">
            <p style="background:#fff3cd; padding:10px; border-radius:8px; font-size:13px;">Dán link ảnh Bằng lái, Cà vẹt, Xe để sếp duyệt hồ sơ nhé!</p>
            <input type="text" id="p-banglai" placeholder="Link ảnh Bằng lái">
            <input type="text" id="p-cavet" placeholder="Link ảnh Cà vẹt">
            <input type="text" id="p-anhxe" placeholder="Link ảnh Xe">
            <button class="btn-success" onclick="guiHoSo()">GỬI HỒ SƠ</button>
            <button onclick="dangXuat()" style="margin-top:10px; background:#666; color:white;">THOÁT</button>
        </div>
    </div>

    <div id="scr-main" class="hidden">
        <div class="header"><h3 id="u-welcome">KhaLy GO</h3></div>
        <div class="content">
            <div id="view-khach" class="hidden">
                <div class="xe-grid">
                    <div class="xe-item" onclick="setXe('Xe ôm', this)"><img src="https://cdn-icons-png.flaticon.com/512/713/713437.png"><br>Xe ôm</div>
                    <div class="xe-item" onclick="setXe('Bao xe 7 chỗ', this)"><img src="https://cdn-icons-png.flaticon.com/512/3202/3202926.png"><br>Bao xe</div>
                    <div class="xe-item" onclick="setXe('Tiện chuyến', this)"><img src="https://cdn-icons-png.flaticon.com/512/1048/1048315.png"><br>Tiện chuyến</div>
                    <div class="xe-item" onclick="setXe('Xe 1 chiều', this)"><img src="https://cdn-icons-png.flaticon.com/512/744/744465.png"><br>1 chiều</div>
                </div>
                <input type="text" id="u-tu" placeholder="📍 Điểm đón">
                <input type="text" id="u-den" placeholder="🏁 Điểm đến">
                <div style="display:flex; gap:5px;">
                    <input type="date" id="u-ngay">
                    <input type="time" id="u-gio">
                </div>
                <button class="btn-success" onclick="guiDon()">GỬI YÊU CẦU ĐẶT XE</button>
            </div>
            
            <div id="view-tx-don" class="hidden">
                <p style="font-weight:bold; color:var(--primary);">ĐƠN HÀNG ĐÃ DUYỆT GIÁ:</p>
                <div id="list-don-tx"></div>
            </div>
            <button onclick="dangXuat()" style="margin-top:20px; background:#666; color:white;">ĐĂNG XUẤT</button>
        </div>
    </div>

    <div id="scr-admin" class="hidden">
        <div class="header"><h3>QUẢN TRỊ KHALY GO</h3></div>
        <div class="content">
            <div class="admin-nav">
                <button class="nav-btn" id="t-don" onclick="loadAd('don')">ĐƠN</button>
                <button class="nav-btn" id="t-khach" onclick="loadAd('khach')">KHÁCH</button>
                <button class="nav-btn" id="t-tx" onclick="loadAd('tx')">TÀI XẾ</button>
                <button class="nav-btn" id="t-gopy" onclick="loadAd('gopy')">GÓP Ý</button>
            </div>
            <div id="admin-content"></div>
            <button onclick="dangXuat()" style="margin-top:20px; background:#666; color:white;">THOÁT ADMIN</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://khaly-go-23798-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const SO_SEP = "0789454369";
    let curSdt = "", curXe = "";

    function kiemTraPhien() {
        const d = localStorage.getItem('khaly_user');
        if (d) { 
            curSdt = JSON.parse(d).sdt;
            if(curSdt === SO_SEP) { vaoAdmin(); return; }
            db.ref('users/' + curSdt).once('value', s => { if(s.val()) hienThi(s.val().vaiTro, s.val().daDuyet); });
        }
    }

    function xuLyDangNhap() {
        const sdt = document.getElementById('login-sdt').value, mk = document.getElementById('login-pass').value;
        if(sdt === SO_SEP) { localStorage.setItem('khaly_user', JSON.stringify({sdt: sdt})); vaoAdmin(); return; }
        db.ref('users/' + sdt).once('value', s => {
            const d = s.val();
            if(d && d.matKhau === mk) {
                localStorage.setItem('khaly_user', JSON.stringify({sdt: sdt}));
                hienThi(d.vaiTro, d.daDuyet);
            } else alert("Sai mật khẩu rồi sếp!");
        });
    }

    function hienThi(role, daDuyet) {
        document.getElementById('scr-login').classList.add('hidden');
        if(role === 'admin' && !daDuyet) { document.getElementById('scr-tx-cho').classList.remove('hidden'); }
        else { 
            document.getElementById('scr-main').classList.remove('hidden');
            if(role === 'admin') { document.getElementById('view-tx-don').classList.remove('hidden'); loadDonChoTX(); }
            else { document.getElementById('view-khach').classList.remove('hidden'); }
        }
    }

    function vaoAdmin() { document.getElementById('scr-login').classList.add('hidden'); document.getElementById('scr-admin').classList.remove('hidden'); loadAd('don'); }

    // --- LOGIC ĐẶT ĐƠN VÀ DUYỆT ĐƠN ---
    function guiDon() {
        const tu = document.getElementById('u-tu').value, den = document.getElementById('u-den').value;
        const ngay = document.getElementById('u-ngay').value, gio = document.getElementById('u-gio').value;
        if(!tu || !ngay) return alert("Sếp nhập điểm đón và ngày giờ nhen!");
        db.ref('don_cho_duyet').push({
            khach: curSdt, loai: curXe || 'Bao xe', tu: tu, den: den, tg: ngay + " " + gio, status: 'Đang chờ sếp báo giá'
        }).then(() => alert("Đã gửi! Sếp đang xem đơn và sẽ báo giá cho sếp ngay."));
    }

    function loadAd(t) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(document.getElementById('t-'+t)) document.getElementById('t-'+t).classList.add('active');
        const view = document.getElementById('admin-content'); view.innerHTML = "Đang tải...";

        if(t === 'don') {
            db.ref('don_cho_duyet').on('value', s => {
                let h = "";
                s.forEach(c => {
                    const d = c.val();
                    h += `<div class="card">
                        <span class="time-tag"><i class="fa fa-clock"></i> ${d.tg}</span>
                        <b>${d.loai}</b><br>
                        <a href="tel:${d.khach}" class="call-link"><i class="fa fa-phone"></i> Gọi khách: ${d.khach}</a><br>
                        📍 ${d.tu} ➔ ${d.den}<br>
                        <input type="text" id="gia-${c.key}" placeholder="Nhập giá (Ví dụ: 400k)">
                        <button class="btn-success" onclick="duyetDon('${c.key}')" style="margin-top:10px;">DUYỆT & BÁO GIÁ CHO TÀI XẾ</button>
                    </div>`;
                });
                view.innerHTML = h || "Hết đơn chờ rồi sếp!";
            });
        } else if(t === 'tx') {
            db.ref('users').orderByChild('vaiTro').equalTo('admin').on('value', s => {
                let h = "";
                s.forEach(c => {
                    const d = c.val(); if(c.key === SO_SEP) return;
                    h += `<div class="card">
                        <a href="tel:${c.key}" class="call-link">📞 ${c.key}</a><br>
                        ${d.bangLai ? `<a href="${d.bangLai}" target="_blank" style="font-size:11px;">[Xem Giấy Tờ]</a>` : '<span style="color:red">Chưa gửi HS</span>'}
                        <div style="margin-top:10px;">
                            ${d.choDuyet ? `<button class="btn-success" style="width:auto;padding:5px 10px;" onclick="db.ref('users/${c.key}').update({daDuyet:true,choDuyet:false})">DUYỆT HS</button>` : ''}
                            <button class="btn-danger" onclick="db.ref('users/${c.key}').remove()">XÓA</button>
                        </div>
                    </div>`;
                });
                view.innerHTML = h || "Trống";
            });
        } else if(t === 'gopy') {
            view.innerHTML = `
                <div style="padding:15px; background:#fff; border-radius:12px; border:1px solid #ddd;">
                    <p style="font-weight:bold; color:var(--primary);">HÒM THƯ GÓP Ý</p>
                    <form action="https://formsubmit.co/tranvokhaly2015@gmail.com" method="POST">
                        <input type="tel" name="Số điện thoại" value="${curSdt}" readonly>
                        <textarea name="Nội dung" rows="4" placeholder="Sếp cần góp ý gì cứ nhập vào đây nhé..." required></textarea>
                        <button type="submit" class="btn-success">GỬI GÓP Ý NGAY</button>
                    </form>
                </div>`;
        } else {
            db.ref('users').orderByChild('vaiTro').equalTo('khach').once('value', s => {
                let h = ""; s.forEach(c => { h += `<div class="card"><a href="tel:${c.key}" class="call-link">📞 ${c.key}</a> <button class="btn-danger" onclick="db.ref('users/${c.key}').remove()">XÓA</button></div>`; });
                view.innerHTML = h || "Trống";
            });
        }
    }

    function duyetDon(id) {
        const gia = document.getElementById('gia-'+id).value;
        if(!gia) return alert("Phải nhập giá mới đẩy đơn được sếp ơi!");
        db.ref('don_cho_duyet/' + id).once('value', s => {
            const data = s.val(); data.gia = gia;
            db.ref('don_da_duyet').push(data).then(() => {
                db.ref('don_cho_duyet/' + id).remove();
                alert("Đã chốt giá! Đơn đã được đẩy lên cho tài xế.");
            });
        });
    }

    function loadDonChoTX() {
        db.ref('don_da_duyet').on('value', s => {
            let h = "";
            s.forEach(c => {
                const d = c.val();
                h += `<div class="card" style="border-left-color:green">
                    <span class="time-tag"><i class="fa fa-calendar-check"></i> ${d.tg}</span>
                    <b style="color:green; font-size:16px;">GIÁ CHỐT: ${d.gia}</b><br>
                    <b>Loại xe: ${d.loai}</b><br>
                    <a href="tel:${d.khach}" class="call-link"><i class="fa fa-phone"></i> Gọi khách ngay: ${d.khach}</a><br>
                    📍 ${d.tu} ➔ ${d.den}
                </div>`;
            });
            document.getElementById('list-don-tx').innerHTML = h || "Đang chờ sếp duyệt đơn...";
        });
    }

    function setXe(l, el) { curXe = l; document.querySelectorAll('.xe-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); }
    function dangKy(role) {
        const sdt = document.getElementById('login-sdt').value, mk = document.getElementById('login-pass').value;
        if(sdt.length < 10) return alert("Nhập đúng SĐT nhen!");
        db.ref('users/' + sdt).set({ matKhau: mk, vaiTro: role, daDuyet: (role === 'khach') }).then(() => { alert("Đăng ký xong!"); location.reload(); });
    }
    function guiHoSo() {
        const bl = document.getElementById('p-banglai').value, cv = document.getElementById('p-cavet').value, ax = document.getElementById('p-anhxe').value;
        if(!bl || !cv) return alert("Nhập đủ link ảnh hồ sơ nhé!");
        db.ref('users/' + curSdt).update({ bangLai: bl, caVet: cv, anhXe: ax, choDuyet: true }).then(() => alert("Đã gửi! Chờ sếp duyệt là xong."));
    }
    function dangXuat() { localStorage.removeItem('khaly_user'); location.reload(); }
    function openReg() { document.getElementById('reg-box').classList.toggle('hidden'); }
</script>
</body>
</html>
