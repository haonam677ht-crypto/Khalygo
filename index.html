<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhaLy GO - Quản Lý Vận Tải</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        .page { display: none; } .active { display: block; }
        .selected { background-color: #ef4444 !important; color: white !important; }
        .tab-btn.active { border-bottom: 2px solid #ef4444; color: #ef4444; }
    </style>
</head>
<body class="bg-[#1a1c2e] text-slate-200 font-sans text-xs">

    <div id="login-page" class="page p-6 active">
        <div class="max-w-md mx-auto bg-[#242745] rounded-3xl mt-10 overflow-hidden border border-slate-700 shadow-2xl">
            <div class="bg-red-600 p-8 text-center font-black text-4xl italic text-white">KLG</div>
            <div id="login-form" class="p-8 space-y-4">
                <input id="phone" type="number" placeholder="Số điện thoại" class="w-full bg-[#1a1c2e] p-4 rounded-xl border border-slate-600 outline-none text-white">
                <input id="pass" type="password" placeholder="Mật khẩu" class="w-full bg-[#1a1c2e] p-4 rounded-xl border border-slate-600 outline-none text-white">
                <div class="flex justify-around py-2 font-black uppercase border-y border-slate-700 text-[10px]">
                    <label><input type="radio" name="role" value="khach"> Khách</label>
                    <label><input type="radio" name="role" value="taixe"> Tài xế</label>
                    <label><input type="radio" name="role" value="admin" checked> Admin</label>
                </div>
                <button onclick="handleLogin()" class="w-full bg-red-600 py-4 rounded-xl text-white font-black text-base">ĐĂNG NHẬP</button>
                <button onclick="toggleAuth('reg')" class="w-full text-slate-400 font-bold uppercase mt-2 text-center">Đăng ký mới</button>
            </div>
            <div id="reg-form" class="p-8 space-y-4 hidden">
                <input id="r-phone" type="number" placeholder="SĐT đăng ký" class="w-full bg-[#1a1c2e] p-4 rounded-xl border border-slate-600 text-white">
                <input id="r-pass" type="password" placeholder="Mật khẩu" class="w-full bg-[#1a1c2e] p-4 rounded-xl border border-slate-600 text-white">
                <div class="flex gap-2 font-bold">
                    <label class="flex-1 bg-slate-800 p-3 rounded-lg text-center"><input type="radio" name="r-role" value="khach" checked> KHÁCH</label>
                    <label class="flex-1 bg-slate-800 p-3 rounded-lg text-center"><input type="radio" name="r-role" value="taixe"> TÀI XẾ</label>
                </div>
                <button onclick="handleRegister()" class="w-full bg-blue-600 py-4 rounded-xl font-black text-white">ĐĂNG KÝ</button>
                <button onclick="toggleAuth('login')" class="w-full text-slate-500 text-center block">Quay lại</button>
            </div>
        </div>
    </div>

    <div id="admin-page" class="page p-4">
        <div class="flex justify-between items-center mb-4 border-b border-slate-700 pb-2">
            <span class="text-yellow-400 font-black uppercase text-sm italic">HỆ THỐNG QUẢN TRỊ</span>
            <button onclick="logout()" class="text-red-400 border border-red-400 px-3 py-1 rounded font-bold uppercase">Thoát</button>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-blue-900/20 p-4 rounded-xl border border-blue-500/30 mb-4 space-y-2">
                <h3 class="text-blue-400 font-black uppercase italic text-[10px]">➕ Sếp tự tạo đơn</h3>
                <input id="ad-p" type="number" placeholder="SĐT Khách" class="w-full bg-slate-800 p-2 rounded border border-slate-600 text-white">
                <input id="ad-svc" type="text" placeholder="Loại xe (4c, 7c...)" class="w-full bg-slate-800 p-2 rounded border border-slate-600 text-white">
                <div class="flex gap-2">
                    <input id="ad-tu-new" type="text" placeholder="Điểm đi" class="flex-1 bg-slate-800 p-2 rounded border border-slate-600 text-white text-[10px]">
                    <input id="ad-den-new" type="text" placeholder="Điểm đến" class="flex-1 bg-slate-800 p-2 rounded border border-slate-600 text-white text-[10px]">
                </div>
                <div class="flex gap-2">
                    <input id="ad-ng-new" type="date" class="flex-1 bg-slate-800 p-2 rounded border border-slate-600 text-white text-[10px]">
                    <input id="ad-gi-new" type="time" class="flex-1 bg-slate-800 p-2 rounded border border-slate-600 text-white text-[10px]">
                </div>
                <button onclick="adminCreateOrder()" class="w-full bg-blue-600 py-2 rounded font-black mt-2 uppercase text-white">Tạo đơn</button>
            </div>

            <div class="bg-green-900/20 p-4 rounded-xl border border-green-500/30 mb-4 text-center">
                <h3 class="text-green-400 font-black uppercase italic text-[10px] mb-2">💰 Ví tiền tài xế</h3>
                <button onclick="napTienTX()" class="w-full bg-green-600 py-3 rounded font-black uppercase text-white shadow-lg">Bấm nạp tiền</button>
            </div>
        </div>

        <div class="space-y-4">
            <section class="bg-[#242745] rounded-xl border border-slate-700 overflow-hidden shadow-md">
                <button onclick="document.getElementById('ad-tx-list').classList.toggle('hidden')" class="w-full p-3 flex justify-between items-center font-black text-green-400 uppercase italic text-[10px]">
                    <span>📂 Danh sách Tài xế</span>
                    <span>▼</span>
                </button>
                <div id="ad-tx-list" class="space-y-1 p-2 border-t border-slate-700 hidden"></div>
            </section>

            <section>
                <h3 class="text-orange-400 font-black mb-2 uppercase italic text-[10px]">🔔 Đơn hiện tại (Vàng: Chờ / Xanh: Đã báo giá)</h3>
                <div id="ad-ord-list" class="space-y-2"></div>
            </section>

            <section class="bg-slate-800/50 rounded-xl border border-slate-700 overflow-hidden">
                <button onclick="document.getElementById('ad-cus-list').classList.toggle('hidden')" class="w-full p-3 flex justify-between items-center font-black text-blue-400 uppercase italic text-[10px]">
                    <span>👤 Danh sách Khách hàng</span>
                    <span>▼</span>
                </button>
                <div id="ad-cus-list" class="space-y-1 p-2 border-t border-slate-700 hidden"></div>
            </section>
        </div>
    </div>

    <div id="taixe-page" class="page p-4">
        <div class="flex justify-between items-center mb-4 border-b border-slate-700 pb-2">
            <span class="text-green-500 font-black uppercase text-sm">Bác Tài KLG</span>
            <div class="flex gap-2">
                <button onclick="location.href='tel:0789454369'" class="bg-blue-600 px-2 py-1 rounded font-bold">📞 ADMIN</button>
                <button onclick="logout()" class="text-red-400 border border-red-400 px-2 py-1 rounded font-bold uppercase text-[8px]">Thoát</button>
            </div>
        </div>
        <div class="bg-slate-800/50 p-3 rounded-lg mb-4 text-center border border-slate-600 shadow-inner">
            <span class="text-[10px] text-slate-400 uppercase">Ví tiền:</span> 
            <span id="tx-so-du" class="text-yellow-400 font-black text-lg ml-2">0K</span>
        </div>
        <div class="flex border-b border-slate-700 mb-4 text-center font-bold">
            <button onclick="showTxTab('tx-orders','taixe')" id="tx-tab-o" class="flex-1 py-2 tab-btn active uppercase text-[10px]">Đơn hàng</button>
            <button onclick="showTxTab('tx-profile','taixe')" id="tx-tab-p" class="flex-1 py-2 tab-btn uppercase text-[10px]">Hồ sơ của tôi</button>
        </div>
        <div id="tx-orders" class="space-y-3">
            <div id="tx-list"></div>
        </div>
        <div id="tx-profile" class="hidden space-y-4">
            <div class="bg-[#242745] p-4 rounded-xl border border-slate-700 space-y-3">
                <input id="profile-name" type="text" placeholder="Họ và Tên" class="w-full bg-[#1a1c2e] p-3 rounded-lg border border-slate-600 text-white outline-none">
                <input id="profile-license" type="text" placeholder="Link ảnh Bằng lái" class="w-full bg-[#1a1c2e] p-3 rounded-lg border border-slate-600 text-white outline-none">
                <input id="profile-car" type="text" placeholder="Link ảnh Xe" class="w-full bg-[#1a1c2e] p-3 rounded-lg border border-slate-600 text-white outline-none">
                <input id="profile-cavet" type="text" placeholder="Link ảnh Cà vẹt" class="w-full bg-[#1a1c2e] p-3 rounded-lg border border-slate-600 text-white outline-none">
                <button onclick="updateProfile('taixe')" class="w-full bg-green-600 py-3 rounded-xl font-black uppercase text-white shadow-lg">Lưu hồ sơ</button>
            </div>
        </div>
    </div>
    <div id="khach-page" class="page p-4">
        <div class="flex justify-between items-center mb-4 border-b border-slate-700 pb-2">
            <span class="text-red-500 font-black italic text-sm uppercase">KhaLy GO</span>
            <div class="flex gap-2">
                <button onclick="location.href='tel:0789454369'" class="bg-blue-600 px-2 py-1 rounded font-bold">📞 ADMIN</button>
                <button onclick="logout()" class="text-red-400 border border-red-400 px-2 py-1 rounded font-bold uppercase text-[8px]">Thoát</button>
            </div>
        </div>
        <div class="flex border-b border-slate-700 mb-4 text-center font-bold">
            <button onclick="showTxTab('kh-booking','khach')" id="kh-tab-o" class="flex-1 py-2 tab-btn active uppercase text-[10px]">Đặt xe</button>
            <button onclick="showTxTab('kh-profile','khach')" id="kh-tab-p" class="flex-1 py-2 tab-btn uppercase text-[10px]">Hồ sơ</button>
        </div>
        <div id="kh-booking" class="space-y-4">
            <div class="bg-[#242745] p-5 rounded-2xl border border-slate-700 space-y-4 shadow-2xl">
                <div class="grid grid-cols-2 gap-2 font-black uppercase">
                    <button onclick="setSvc('Xe ôm',this)" class="svc-btn bg-slate-800 p-3 rounded-xl border border-slate-600">🏍️ Xe ôm</button>
                    <button onclick="setSvc('Xe bao',this); document.getElementById('xb-opt').classList.remove('hidden')" class="svc-btn bg-slate-800 p-3 rounded-xl border border-slate-600">🚗 Xe bao</button>
                    <button onclick="setSvc('Tiện chuyến',this)" class="svc-btn bg-slate-800 p-3 rounded-xl border border-slate-600">🤝 Tiện chuyến</button>
                    <button onclick="setSvc('1 chiều',this)" class="svc-btn bg-slate-800 p-3 rounded-xl border border-slate-600">➡️ 1 chiều</button>
                </div>
                <div id="xb-opt" class="hidden grid grid-cols-3 gap-2 py-2 border-t border-slate-700">
                    <button onclick="setSvc('Xe bao 4c',this)" class="sub-btn bg-slate-700 p-2 rounded text-[9px] font-bold">4 CHỖ</button>
                    <button onclick="setSvc('Xe bao 7c',this)" class="sub-btn bg-slate-700 p-2 rounded text-[9px] font-bold">7 CHỖ</button>
                    <button onclick="setSvc('Xe bao 16c',this)" class="sub-btn bg-slate-700 p-2 rounded text-[9px] font-bold">16 CHỖ</button>
                </div>
                <input id="final-svc" type="hidden">
                <input id="tu" type="text" placeholder="Điểm đón" class="w-full bg-[#1a1c2e] p-4 rounded-xl border border-slate-600 text-white">
                <input id="den" type="text" placeholder="Điểm đến" class="w-full bg-[#1a1c2e] p-4 rounded-xl border border-slate-600 text-white">
                <div class="flex gap-2">
                    <input id="ng" type="date" class="flex-1 bg-[#1a1c2e] p-4 rounded-xl text-white outline-none">
                    <input id="gi" type="time" class="flex-1 bg-[#1a1c2e] p-4 rounded-xl border-slate-600 text-white">
                </div>
                <button onclick="createOrder()" class="w-full bg-red-600 py-4 rounded-xl font-black text-base uppercase text-white shadow-xl">Gửi đơn</button>
            </div>
            <div id="kh-list" class="mt-6 space-y-2"></div>
        </div>
        <div id="kh-profile" class="hidden space-y-4">
            <div class="bg-[#242745] p-4 rounded-xl border border-slate-700 space-y-3">
                <h4 class="text-blue-500 font-bold uppercase italic text-[10px]">Thông tin khách hàng</h4>
                <input id="kh-name" type="text" placeholder="Họ và Tên chú" class="w-full bg-[#1a1c2e] p-3 rounded-lg border border-slate-600 text-white outline-none">
                <button onclick="updateProfile('khach')" class="w-full bg-blue-600 py-3 rounded-xl font-black uppercase text-white shadow-lg">Lưu thông tin</button>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA7D06JXpU4zFnT2pYpbuZlw-YCb8F8VpQ",
        authDomain: "khaly-go-23798.firebaseapp.com",
        databaseURL: "https://khaly-go-23798-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "khaly-go-23798", storageBucket: "khaly-go-23798.appspot.com",
        messagingSenderId: "328254923276", appId: "1:328254923276:web:625f6be13a31b0a9264429"
    };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();

    var lastAdminCount = -1;
    var lastTaixeCount = -1;

    function handleLogin() {
        const p = document.getElementById('phone').value, mk = document.getElementById('pass').value, r = document.querySelector('input[name="role"]:checked').value;
        if (r === 'admin' && p === "0789454369" && mk === "19861990LyVinh@") return saveSession(p, 'admin');
        db.ref('users/' + p).once('value', s => {
            const u = s.val(); if (u && u.pass === mk && u.role === r) saveSession(p, u.role); else alert("Lỗi đăng nhập!");
        });
    }
    function handleRegister() {
        const p = document.getElementById('r-phone').value, mk = document.getElementById('r-pass').value, r = document.querySelector('input[name="r-role"]:checked').value;
        db.ref('users/'+p).set({pass:mk, role:r, soDu:0}).then(() => { alert("Đã đăng ký!"); saveSession(p, r); });
    }
    function saveSession(p, r) { localStorage.setItem('klg_u', JSON.stringify({p, r})); location.reload(); }
    function logout() { localStorage.removeItem('klg_u'); location.reload(); }

    function showTxTab(id, role) { 
        if(role === 'taixe') {
            document.getElementById('tx-orders').classList.toggle('hidden', id !== 'tx-orders');
            document.getElementById('tx-profile').classList.toggle('hidden', id !== 'tx-profile');
            document.getElementById('tx-tab-o').classList.toggle('active', id === 'tx-orders');
            document.getElementById('tx-tab-p').classList.toggle('active', id === 'tx-profile');
        } else {
            document.getElementById('kh-booking').classList.toggle('hidden', id !== 'kh-booking');
            document.getElementById('kh-profile').classList.toggle('hidden', id !== 'kh-profile');
            document.getElementById('kh-tab-o').classList.toggle('active', id === 'kh-booking');
            document.getElementById('kh-tab-p').classList.toggle('active', id === 'kh-profile');
        }
    }
    function updateProfile(role) {
        const u=JSON.parse(localStorage.getItem('klg_u'));
        if(role === 'taixe') {
            const n=document.getElementById('profile-name').value, l=document.getElementById('profile-license').value, c=document.getElementById('profile-car').value, cv=document.getElementById('profile-cavet').value;
            db.ref('users/'+u.p).update({ten:n, banglai:l, anhxe:c, cavet:cv}).then(()=>alert("Đã lưu!"));
        } else {
            const n=document.getElementById('kh-name').value;
            db.ref('users/'+u.p).update({ten:n}).then(()=>alert("Đã lưu tên!"));
        }
    }

    function adminCreateOrder() {
        const p = document.getElementById('ad-p').value, s = document.getElementById('ad-svc').value;
        const tu = document.getElementById('ad-tu-new').value, den = document.getElementById('ad-den-new').value, ng = document.getElementById('ad-ng-new').value, gi = document.getElementById('ad-gi-new').value;
        if(!p || !s || !tu || !den) return alert("Thiếu tin!");
        db.ref('users/' + p).once('value', s_kh => {
            if (!s_kh.exists()) db.ref('users/' + p).set({ pass: "123", role: "khach", soDu: 0 });
            db.ref('orders').push({ khach: p, svc: s, tu: tu, den: den, ngay: ng, gio: gi, status: 'cho' }).then(() => alert("Đã tạo!"));
        });
    }

    function txNhanDon(id, gia) {
        const u = JSON.parse(localStorage.getItem('klg_u')), phi = Math.round(gia * 0.12);
        db.ref('users/'+u.p).once('value', s => {
            const sd = s.val().soDu || 0;
            if(sd < phi) {
                let m = document.getElementById('qr-modal');
                if(!m) { m = document.createElement('div'); m.id = 'qr-modal'; m.className = "fixed inset-0 bg-black/95 flex items-center justify-center z-[9999]"; document.body.appendChild(m); }
                m.innerHTML = `<div class="bg-[#242745] p-6 rounded-3xl text-center border border-slate-700">
                    <div class="bg-red-600 py-2 font-black mb-4">VÍ KHÔNG ĐỦ TIỀN</div>
                    <img src="https://api.vietqr.io/image/970422-0789454369-compact2.jpg?amount=100000&addInfo=KLG%20${u.p}" class="w-40 h-40 mx-auto bg-white p-2 rounded mb-4">
                    <button onclick="this.closest('#qr-modal').remove()" class="w-full bg-slate-700 py-2 rounded font-bold">ĐÓNG</button>
                </div>`;
                return;
            }
            if(confirm("Nhận đơn?")) {
                db.ref('users/'+u.p).update({soDu: sd - phi});
                db.ref('orders/'+id).update({status: 'da_nhan', taiXe: u.p});
            }
        });
    }
    function loadTaixe() {
        const uSes = JSON.parse(localStorage.getItem('klg_u'));
        db.ref('users/' + uSes.p).on('value', s => { document.getElementById('tx-so-du').innerText = (s.val().soDu || 0) + "K"; });
        db.ref('orders').on('value', s => {
            let h=""; let countDa = 0;
            s.forEach(o => { 
                const d=o.val(); 
                if(d.status === 'da') countDa++;
                if(d.status === 'da' || (d.status === 'da_nhan' && d.taiXe === uSes.p)) {
                    const daNhan = (d.status === 'da_nhan');
                    h+=`<div class="bg-[#242745] p-4 rounded-xl border border-slate-700 mb-3 shadow-lg">
                        <div class="flex justify-between mb-2"><span class="bg-red-600 px-2 py-0.5 rounded text-[8px] font-black uppercase text-white">${d.svc}</span><span class="text-[9px] text-yellow-400 font-bold italic">📅 ${d.gio || ''} - ${d.ngay || ''}</span></div>
                        <p class="text-[10px]">📍 ${d.tu} → ${d.den}</p>
                        <p class="font-bold mt-1 text-blue-400">📞 SĐT: ${daNhan ? `<a href="tel:${d.khach}" class="underline">${d.khach}</a>` : '*********'}</p>
                        <p class="text-green-400 font-black text-sm">${d.gia}K</p>
                        ${!daNhan ? `<button onclick="txNhanDon('${o.key}',${d.gia})" class="w-full bg-blue-600 mt-2 py-3 rounded-xl font-black text-white uppercase">NHẬN ĐƠN</button>` : 
                        `<div class="flex gap-2 mt-2"><button class="flex-1 bg-green-700 p-2 rounded-xl text-[10px] font-black">ĐÃ NHẬN</button><button onclick="if(confirm('Xong?'))db.ref('orders/${o.key}').update({status:'hoan_thanh'})" class="flex-1 bg-orange-600 p-2 rounded-xl text-[10px] font-black italic">XONG</button></div>`}
                    </div>`;
                }
            });
            if(lastTaixeCount !== -1 && countDa > lastTaixeCount && Notification.permission === "granted") {
                new Notification("KhaLy GO", { body: "Có đơn mới đã báo giá! Vào húp ngay anh em ơi." });
            }
            lastTaixeCount = countDa;
            document.getElementById('tx-list').innerHTML = h || "Đợi đơn...";
        });
    }

    function xemHoSo(p, type) {
        db.ref('users/'+p).once('value', s => {
            const u = s.val();
            if(type === 'taixe') alert(`TÀI XẾ: ${p}\n- Tên: ${u.ten||'Trống'}\n- Bằng lái: ${u.banglai||'N/A'}\n- Ảnh xe: ${u.anhxe||'N/A'}\n- Cà vẹt: ${u.cavet||'N/A'}`);
            else alert(`KHÁCH HÀNG: ${p}\n- Tên: ${u.ten||'Chưa cập nhật'}`);
        });
    }

    function loadAdmin() {
        db.ref('orders').on('value', s => {
            let hO = ""; let countCho = 0;
            s.forEach(o => { 
                const d = o.val(); 
                if(d.status === 'cho') countCho++;
                if(d.status === 'cho' || d.status === 'da') {
                    hO += `<div class="bg-[#242745] p-3 rounded-lg border-l-4 ${d.status==='da'?'border-green-500':'border-yellow-500'} mb-2 relative shadow-md">
                        <button onclick="db.ref('orders/${o.key}').remove()" class="absolute right-2 top-2 text-red-500 font-bold">×</button>
                        <div class="flex justify-between items-center mb-1"><span class="bg-red-600 px-2 py-0.5 rounded text-[8px] font-black uppercase text-white">${d.svc}</span><span class="text-yellow-400 text-[9px] italic">⏰ ${d.gio||'?'}, ngày ${d.ngay||'?'}</span></div>
                        <p class="text-blue-400 font-bold mb-1">📞 Khách: <a href="tel:${d.khach}" class="underline">${d.khach}</a></p>
                        <p class="text-[9px]">📍 ${d.tu} → ${d.den}</p>
                        <div class="flex gap-2 mt-2"><input id="g-${o.key}" type="number" value="${d.gia||''}" class="text-black w-16 p-1 text-[10px] rounded" placeholder="Giá"><button onclick="db.ref('orders/${o.key}').update({gia:document.getElementById('g-${o.key}').value,status:'da'})" class="bg-green-600 px-2 rounded text-[10px] font-bold text-white uppercase">Đẩy giá</button></div>
                    </div>`;
                }
            });
            if(lastAdminCount !== -1 && countCho > lastAdminCount && Notification.permission === "granted") {
                new Notification("KhaLy GO - ADMIN", { body: "Có đơn khách đặt mới! Sếp vào báo giá ngay." });
            }
            lastAdminCount = countCho;
            document.getElementById('ad-ord-list').innerHTML = hO;
        });
        db.ref('users').on('value', s => {
            let hTx="", hC=""; s.forEach(u => {
                const ud=u.val(); 
                if(ud.role==='taixe') hTx+=`<div class="p-2 border-b border-slate-700 flex justify-between items-center"><div onclick="xemHoSo('${u.key}','taixe')" class="cursor-pointer text-white italic">🚗 ${ud.ten || u.key}</div><div class="flex gap-3"><a href="tel:${u.key}" class="text-blue-400 font-bold">GỌI</a><span class="text-yellow-500">${ud.soDu || 0}K</span></div></div>`;
                else if(ud.role==='khach') hC+=`<div class="p-2 border-b border-slate-700 flex justify-between items-center"><div onclick="xemHoSo('${u.key}','khach')" class="cursor-pointer">👤 ${ud.ten || u.key}</div><a href="tel:${u.key}" class="text-blue-400 font-bold">GỌI</a></div>`;
            });
            document.getElementById('ad-tx-list').innerHTML = hTx;
            document.getElementById('ad-cus-list').innerHTML = hC;
        });
    }

    function khachHuyDon(id) {
        if(confirm("Bạn muốn hủy đơn này?")) db.ref('orders/' + id).remove().then(() => alert("Đã hủy đơn!"));
    }
    function loadKhach() {
        const u=JSON.parse(localStorage.getItem('klg_u'));
        db.ref('orders').orderByChild('khach').equalTo(u.p).on('value', s => {
            let h=""; s.forEach(o => { 
                const d=o.val(); 
                if(d.status !== 'hoan_thanh' && d.status !== 'da_nhan') {
                    h+=`<div class="bg-[#242745] p-4 rounded-xl border border-slate-700 mb-2 relative">
                        <button onclick="khachHuyDon('${o.key}')" class="absolute right-3 top-3 bg-red-900/50 text-red-500 border border-red-500/30 px-2 py-1 rounded text-[8px] font-bold">HỦY ĐƠN</button>
                        <p class="text-[10px]">📍 ${d.tu} → ${d.den}</p>
                        <p class="text-yellow-500 font-bold mt-1 text-[10px] italic">${d.status==='cho'?'Đợi báo giá...':(d.status==='da'?'Giá: '+d.gia+'K':'Tài xế đang đến')}</p>
                    </div>`; 
                } else if (d.status === 'da_nhan') {
                     h+=`<div class="bg-[#242745] p-4 rounded-xl border border-green-700 mb-2"><p class="text-[10px]">📍 ${d.tu} → ${d.den}</p><p class="text-green-400 font-bold mt-1 text-[10px] italic">Tài xế đã nhận đơn!</p></div>`;
                }
            });
            document.getElementById('kh-list').innerHTML = h || "Chưa có đơn.";
        });
    }

    function setSvc(v, b) { 
        document.getElementById('final-svc').value = v;
        document.querySelectorAll('.svc-btn, .sub-btn').forEach(el => el.classList.remove('selected'));
        if(b) b.classList.add('selected');
    }

    function createOrder() {
        const u=JSON.parse(localStorage.getItem('klg_u')), s=document.getElementById('final-svc').value, t=document.getElementById('tu').value, d=document.getElementById('den').value, ng=document.getElementById('ng').value, gi=document.getElementById('gi').value;
        if(!s || !t) return alert("Thiếu tin!");
        db.ref('orders').push({khach:u.p, svc:s, tu:t, den:d, ngay:ng, gio:gi, status:'cho'}).then(()=>alert("Đã gửi!"));
    }

    function napTienTX() {
        const p = prompt("SĐT Tài xế:"), v = prompt("Tiền (K):");
        if(p && v) db.ref('users/'+p).once('value', s => {
            if(s.exists()) db.ref('users/'+p).update({soDu: (s.val().soDu || 0) + parseInt(v)}).then(()=>alert("Đã nạp!"));
        });
    }

    function toggleAuth(t) { document.getElementById('login-form').classList.toggle('hidden', t==='reg'); document.getElementById('reg-form').classList.toggle('hidden', t==='login'); }

    window.onload = () => { 
        if (window.Notification && Notification.permission !== "granted") Notification.requestPermission();
        const u=localStorage.getItem('klg_u'); 
        if(u){ 
            const j=JSON.parse(u); 
            document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); 
            document.getElementById(j.r+'-page').classList.add('active'); 
            if(j.r==='admin') loadAdmin(); if(j.r==='taixe') loadTaixe(); if(j.r==='khach') loadKhach();
        } 
    };
</script>
</body>
</html>
