<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhaLy GO - Admin & Driver</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        .page { display: none; } .active { display: block; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-[#1a1c2e] text-slate-200 font-sans text-[11px]">

    <div id="login-page" class="page p-6 active">
        <div class="max-w-md mx-auto bg-[#242745] rounded-3xl mt-10 overflow-hidden border border-slate-700 shadow-2xl text-center">
            <div class="bg-red-600 p-8 font-black text-4xl italic text-white shadow-inner">KLG ADMIN</div>
            <div class="p-8 space-y-4">
                <input id="phone" type="number" placeholder="Số điện thoại" class="w-full bg-[#1a1c2e] p-4 rounded-xl border border-slate-600 outline-none text-white text-base text-center">
                <input id="pass" type="password" placeholder="Mật khẩu" class="w-full bg-[#1a1c2e] p-4 rounded-xl border border-slate-600 outline-none text-white text-base text-center">
                <button onclick="handleLogin()" class="w-full bg-red-600 py-4 rounded-xl text-white font-black text-base uppercase shadow-lg active:scale-95 transition-transform">Đăng nhập</button>
                <button onclick="showPage('register-page')" class="text-slate-400 uppercase font-bold text-[10px] mt-2 block w-full">Đăng ký tài xế mới</button>
            </div>
        </div>
    </div>

    <div id="register-page" class="page p-6">
        <div class="max-w-md mx-auto bg-[#242745] rounded-3xl mt-10 overflow-hidden border border-slate-700 shadow-2xl text-center">
            <div class="bg-blue-600 p-6 font-black text-2xl italic text-white">ĐĂNG KÝ TÀI XẾ</div>
            <div class="p-8 space-y-4">
                <input id="reg-phone" type="number" placeholder="SĐT đăng ký" class="w-full bg-[#1a1c2e] p-4 rounded-xl border border-slate-600 outline-none text-white text-base text-center">
                <input id="reg-pass" type="password" placeholder="Mật khẩu tự chọn" class="w-full bg-[#1a1c2e] p-4 rounded-xl border border-slate-600 outline-none text-white text-base text-center">
                <button onclick="handleRegister()" class="w-full bg-blue-600 py-4 rounded-xl text-white font-black text-base uppercase">Gửi yêu cầu</button>
                <button onclick="showPage('login-page')" class="text-slate-400 text-[10px] block w-full">Quay lại đăng nhập</button>
            </div>
        </div>
    </div>

    <div id="admin-page" class="page p-4">
        <div class="flex justify-between items-center mb-4 border-b border-slate-700 pb-2">
            <span class="text-yellow-400 font-black uppercase text-sm italic">HỆ THỐNG QUẢN TRỊ</span>
            <button onclick="logout()" class="text-red-400 border border-red-400 px-3 py-1 rounded font-bold uppercase text-[9px]">Thoát</button>
        </div>

        <div id="ad-urgent-alerts" class="space-y-2 mb-4"></div>

        <section class="bg-orange-900/10 rounded-xl border border-orange-500/50 overflow-hidden mb-4">
            <div class="p-2 bg-orange-600 text-white font-black uppercase italic flex justify-between items-center">
                <span>🕒 TÀI XẾ CHỜ DUYỆT</span>
                <span id="count-pending" class="bg-white text-orange-600 px-2 rounded-full">0</span>
            </div>
            <div id="ad-pending-list" class="p-2 space-y-2"></div>
        </section>
        
        <div class="bg-blue-900/20 p-4 rounded-xl border border-blue-500/30 mb-4 space-y-2">
            <h3 class="text-blue-400 font-black uppercase italic text-[10px]">➕ SẾP TỰ TẠO ĐƠN</h3>
            <input id="ad-p" type="number" placeholder="SĐT Khách" class="w-full bg-slate-800 p-2 rounded border border-slate-600 text-white">
            <input id="ad-svc" type="text" placeholder="Loại xe (4c, 7c...)" class="w-full bg-slate-800 p-2 rounded border border-slate-600 text-white">
            <div class="grid grid-cols-2 gap-2">
                <input id="ad-tu-new" type="text" placeholder="Điểm đi" class="bg-slate-800 p-2 rounded border border-slate-600 text-white">
                <input id="ad-den-new" type="text" placeholder="Điểm đến" class="bg-slate-800 p-2 rounded border border-slate-600 text-white">
            </div>
            <div class="grid grid-cols-2 gap-2">
                <input id="ad-date" type="date" class="bg-slate-800 p-2 rounded border border-slate-600 text-white font-bold">
                <input id="ad-time" type="time" class="bg-slate-800 p-2 rounded border border-slate-600 text-white font-bold">
            </div>
            <input id="ad-note-new" type="text" placeholder="Ghi chú thêm" class="w-full bg-slate-800 p-2 rounded border border-slate-600 text-white">
            <button onclick="adminCreateOrder()" class="w-full bg-blue-600 py-3 rounded font-black mt-1 uppercase text-white shadow-lg">Tạo đơn</button>
        </div>

        <div class="bg-green-900/20 p-4 rounded-xl border border-green-500/30 mb-4 text-center">
            <h3 class="text-green-400 font-black uppercase italic text-[10px] mb-2">💰 VÍ TIỀN TÀI XẾ</h3>
            <button onclick="napTienTX()" class="w-full bg-green-600 py-3 rounded font-black uppercase text-white shadow-md">BẤM NẠP TIỀN</button>
        </div>

        <section class="mb-4">
            <h3 class="text-yellow-400 font-black mb-2 uppercase italic text-[10px]">🔔 ĐƠN HIỆN TẠI</h3>
            <div id="ad-ord-list" class="space-y-2"></div>
        </section>

        <section class="bg-[#242745] rounded-xl border border-slate-700 overflow-hidden mb-4 shadow-xl">
            <button onclick="toggleDiv('ad-tx-list')" class="w-full p-3 flex justify-between items-center font-black text-yellow-400 uppercase text-[10px] italic">
                <span>📂 TÀI XẾ (CÓ MK)</span>
                <span>▼</span>
            </button>
            <div id="ad-tx-list" class="p-2 space-y-1"></div>
        </section>

        <section class="bg-slate-800/50 rounded-xl border border-slate-700 overflow-hidden shadow-xl">
            <button onclick="toggleDiv('ad-cus-list')" class="w-full p-3 flex justify-between items-center font-black text-blue-400 uppercase text-[10px] italic">
                <span>👤 KHÁCH HÀNG (CÓ MK)</span>
                <span>▼</span>
            </button>
            <div id="ad-cus-list" class="p-2 space-y-1"></div>
        </section>
    </div>

    <div id="taixe-page" class="page p-4">
        <div class="flex justify-between items-center mb-2">
            <span class="text-green-400 font-black italic">BÁC TÀI KLG</span>
            <div class="flex gap-2">
                <a href="tel:0789454369" class="text-yellow-400 border border-yellow-500 px-2 py-1 rounded font-bold text-[9px] uppercase italic">Hỗ trợ</a>
                <button onclick="logout()" class="text-red-400 border border-red-500 px-2 py-1 rounded font-bold text-[9px] uppercase">Thoát</button>
            </div>
        </div>
        <div class="bg-[#242745] p-4 rounded-xl border border-slate-700 text-center mb-4 shadow-xl">
            <p class="text-slate-400 text-[10px] uppercase">VÍ TIỀN</p>
            <p id="tx-balance" class="text-yellow-400 text-2xl font-black">0K</p>
        </div>
        <div class="flex border-b border-slate-700 mb-4 bg-[#242745] rounded-t-xl overflow-hidden">
            <button id="tab-btn-don" onclick="showTxTab('tx-don')" class="flex-1 py-3 font-black text-red-500 border-b-2 border-red-500">ĐƠN HÀNG</button>
            <button id="tab-btn-hoso" onclick="showTxTab('tx-hoso')" class="flex-1 py-3 font-black text-slate-400">HỒ SƠ</button>
        </div>
        <div id="tx-don" class="tx-tab space-y-3">Đang quét đơn...</div>
        <div id="tx-hoso" class="tx-tab hidden space-y-3">
             <input id="tx-ten" type="text" placeholder="Họ và Tên" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-600 text-white">
             <input id="tx-bl" type="text" placeholder="Link ảnh Bằng lái" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-600 text-white">
             <input id="tx-ax" type="text" placeholder="Link ảnh Xe" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-600 text-white">
             <input id="tx-cv" type="text" placeholder="Link ảnh Cà vẹt" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-600 text-white">
             <button onclick="saveHoSo()" class="w-full bg-green-600 py-3 rounded-xl font-black text-white uppercase shadow-lg">Lưu hồ sơ</button>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA7D06JXpU4zFnT2pYpbuZlw-YCb8F8VpQ",
        authDomain: "khaly-go-23798.firebaseapp.com",
        databaseURL: "https://khaly-go-23798-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "khaly-go-23798", storageBucket: "khaly-go-23798.appspot.com",
        messagingSenderId: "328254923276", appId: "1:328254923276:web:625f6be13a31b0a9264429"
    };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();

    function handleLogin() {
        const p = document.getElementById('phone').value;
        const mk = document.getElementById('pass').value;
        if (p === "0789454369" && mk === "19861990LyVinh@") {
            return saveSession(p, 'admin');
        }
        db.ref('users/' + p).once('value', s => {
            const u = s.val(); 
            if (u && u.pass === mk) {
                if(u.role === 'khach') return alert("Tài khoản KHÁCH không thể vào App này!");
                if(u.status === 'pending') return alert("Tài khoản đang chờ duyệt!");
                saveSession(p, u.role);
            } else alert("Sai số điện thoại hoặc mật khẩu!");
        });
    }

    function handleRegister() {
        const p = document.getElementById('reg-phone').value, mk = document.getElementById('reg-pass').value;
        if(!p || !mk) return alert("Nhập đủ thông tin!");
        db.ref('users/' + p).once('value', s => {
            if(s.exists()) return alert("SĐT này đã có trên hệ thống!");
            db.ref('users/' + p).set({ pass: mk, role: 'taixe', status: 'pending', soDu: 0 })
            .then(() => { alert("Đăng ký thành công! Đợi Sếp duyệt."); showPage('login-page'); });
        });
    }

    function loadAdmin() {
        db.ref('users').orderByChild('status').equalTo('pending').on('value', s => {
            let h = "", count = 0;
            s.forEach(u => { count++; const ud = u.val();
                h += `<div class="p-3 bg-slate-900 rounded-lg flex flex-col gap-1 border border-slate-700 mb-1">
                    <div class="flex justify-between items-center"><span class="font-bold">${u.key}</span>
                        <div class="flex gap-1">
                            <button onclick="viewInfo('${u.key}')" class="bg-blue-600 px-2 py-1 rounded text-[9px]">HỒ SƠ</button>
                            <button onclick="db.ref('users/${u.key}').update({status:'active'})" class="bg-green-600 px-2 py-1 rounded text-[9px]">DUYỆT</button>
                        </div>
                    </div></div>`;
            });
            document.getElementById('ad-pending-list').innerHTML = h || "Trống";
            document.getElementById('count-pending').innerText = count;
        });

        db.ref('orders').on('value', s => {
            let h = "", hAlerts = "";
            s.forEach(o => {
                const d = o.val();
                // ƯU TIÊN HIỆN THỊ ĐƠN KHÁCH HỦY HOẶC HOÀN THÀNH LÊN ĐẦU
                if(d.status === 'khach_huy') {
                    hAlerts += `<div class="bg-red-600 p-3 rounded-xl border-2 border-white shadow-lg animate-pulse mb-2">
                        <p class="font-black text-white uppercase italic">⚠️ KHÁCH HỦY - CẦN HOÀN PHÍ!</p>
                        <p class="text-white">TX: ${d.idTaiXe} | Phí: ${Math.round(d.gia*0.12)}K</p>
                        <button onclick="confirmRefund('${o.key}', '${d.idTaiXe}', ${d.gia})" class="w-full bg-white text-red-600 py-2 rounded font-black mt-2 uppercase italic shadow-md">Bấm để hoàn tiền ví</button>
                    </div>`;
                } else if(d.status === 'hoan_thanh') {
                    hAlerts += `<div class="bg-green-600 p-3 rounded-xl border border-white mb-2 shadow-md">
                        <p class="font-black text-white uppercase italic">✅ ĐƠN ĐÃ XONG (TX: ${d.idTaiXe})</p>
                        <p class="text-white italic text-[9px]">Lộ trình: ${d.tu} - ${d.den}</p>
                        <button onclick="db.ref('orders/${o.key}').remove()" class="w-full bg-slate-800 text-white py-1 rounded font-bold mt-2 uppercase text-[9px]">Dọn dẹp & Xóa đơn</button>
                    </div>`;
                } else {
                    // ĐƠN THÔNG THƯỜNG (CHO, DA)
                    h += `<div class="bg-slate-800 p-3 rounded border-l-4 ${d.status==='da'?'border-green-500':'border-yellow-500'} mb-2 relative">
                        <button onclick="db.ref('orders/${o.key}').remove()" class="absolute top-1 right-2 text-red-500">×</button>
                        <p class="text-red-500 font-bold uppercase text-[9px]">🚗 ${d.svc} ${d.status==='dang_chay'?'(ĐANG CHẠY)':''}</p>
                        <p class="text-white font-black">📅 Đón: ${d.date} | ⏰ ${d.time}</p>
                        <p class="text-blue-400 italic">📞 Khách: ${d.khach}</p>
                        <p class="text-slate-300">📍 ${d.tu} → ${d.den}</p>
                        <p class="text-yellow-500 text-[9px]">👷 TX: ${d.idTaiXe || 'Chưa nhận'}</p>
                        <input id="note-${o.key}" type="text" value="${d.ghiChuAdmin || ''}" placeholder="Ghi chú" class="w-full bg-slate-900 p-2 mt-2 rounded border border-slate-700 text-white text-[10px]">
                        <div class="flex gap-2 mt-2">
                            <input id="price-${o.key}" type="number" value="${d.gia || ''}" placeholder="Giá" class="w-20 bg-slate-900 p-2 rounded text-green-400 font-bold border border-slate-700">
                            <button onclick="pushPrice('${o.key}')" class="flex-1 bg-green-600 font-black py-2 rounded text-white italic uppercase">Đẩy giá</button>
                        </div></div>`;
                }
            });
            document.getElementById('ad-urgent-alerts').innerHTML = hAlerts;
            document.getElementById('ad-ord-list').innerHTML = h || "Chưa có đơn mới";
        });
        db.ref('users').on('value', s => {
            let hTx = "", hC = "";
            s.forEach(u => {
                const ud = u.val(); if(ud.status === 'pending') return;
                const item = `<div class="p-2 border-b border-slate-700 flex justify-between items-center">
                    <span onclick="viewInfo('${u.key}')" class="text-slate-300 underline italic font-bold">${ud.ten || u.key}</span>
                    <div class="flex gap-2 items-center">
                        <span class="text-yellow-500 font-bold">${ud.soDu || 0}K</span>
                        <button onclick="deleteUser('${u.key}')" class="text-red-500 px-1 font-black">×</button>
                    </div></div>`;
                if(ud.role === 'taixe') hTx += item; else if(ud.role === 'khach') hC += item;
            });
            document.getElementById('ad-tx-list').innerHTML = hTx;
            document.getElementById('ad-cus-list').innerHTML = hC;
        });
    }

    // HÀM MỚI: ADMIN HOÀN TIỀN CHO TX
    function confirmRefund(orderId, phone, gia) {
        const phi = Math.round(gia * 0.12);
        db.ref('users/'+phone).once('value', s => {
            const currentBal = s.val().soDu || 0;
            db.ref('users/'+phone).update({ soDu: currentBal + phi });
            db.ref('orders/'+orderId).remove();
            alert("Đã hoàn lại " + phi + "K vào ví tài xế!");
        });
    }

    function handleCall(id, kh, gia) {
        const session = JSON.parse(localStorage.getItem('klg_u'));
        const phi = Math.round(gia * 0.12);
        db.ref('users/'+session.p).once('value', s => {
            const u = s.val();
            if((u.soDu || 0) < phi) {
                alert(`Ví không đủ ${phi}K để nhận đơn!`);
            } else {
                if(confirm(`Phí 12% là ${phi}K. Đồng ý trừ tiền để lấy đơn?`)) {
                    db.ref('users/'+session.p).update({ soDu: u.soDu - phi })
                    .then(() => { 
                        db.ref('orders/'+id).update({ idTaiXe: session.p, status: 'dang_chay' });
                        window.location.href = "tel:"+kh; 
                    });
                }
            }
        });
    }

    function finishOrder(id) {
        if(confirm("Xác nhận đã thả khách xong?")) {
            db.ref('orders/'+id).update({ status: 'hoan_thanh' }).then(() => alert("Báo cáo thành công!"));
        }
    }

    function loadTaixe(phone) {
        db.ref('users/'+phone).on('value', s => {
            if(s.val()) document.getElementById('tx-balance').innerText = (s.val().soDu || 0) + "K";
        });
        db.ref('orders').on('value', s => {
            let h = "";
            const session = JSON.parse(localStorage.getItem('klg_u'));
            s.forEach(o => {
                const d = o.val();
                // ĐƠN HỆ THỐNG MỚI ĐẨY GIÁ
                if(d.status === 'da') {
                    h += `<div class="bg-[#242745] p-4 rounded-xl border-l-4 border-green-500 mb-3">
                        <div class="flex justify-between mb-1"><span class="text-red-500 font-black italic">🚗 ${d.svc}</span><span class="text-yellow-400 font-black text-xl">${d.gia}K</span></div>
                        <p class="text-white font-black italic mb-2">📅 ${d.date} | ⏰ ${d.time}</p>
                        <p class="text-slate-300">📍 ${d.tu} → ${d.den}</p>
                        <button onclick="handleCall('${o.key}', '${d.khach}', ${d.gia || 0})" class="w-full bg-blue-600 py-4 rounded-xl font-black text-white mt-3 uppercase italic">📞 Nhận & Gọi khách</button>
                    </div>`;
                } 
                // ĐƠN MÌNH ĐANG CHẠY
                else if (d.idTaiXe === session.p && d.status === 'dang_chay') {
                    h += `<div class="bg-slate-800 p-4 rounded-xl border-2 border-yellow-500 mb-3 shadow-2xl">
                        <p class="text-yellow-500 font-black uppercase mb-2 animate-pulse italic">● Đang thực hiện chuyến</p>
                        <p class="text-white font-bold">📍 ${d.tu} → ${d.den}</p>
                        <div class="grid grid-cols-2 gap-2 mt-4">
                            <button onclick="finishOrder('${o.key}')" class="bg-green-600 py-4 rounded-xl font-black text-white uppercase italic">✅ Xong</button>
                            <button onclick="if(confirm('Báo khách hủy để Admin hoàn phí?')) db.ref('orders/${o.key}').update({status:'khach_huy'})" class="bg-orange-600 py-4 rounded-xl font-black text-white uppercase italic text-[9px]">❌ Khách hủy</button>
                        </div>
                        <button onclick="if(confirm('CẢNH BÁO: Bạn sẽ mất 12% phí nếu tự hủy. Tiếp tục?')) db.ref('orders/${o.key}').update({status:'da', idTaiXe:null})" class="w-full bg-transparent border border-red-500 text-red-500 py-2 rounded-xl font-bold mt-4 text-[9px] uppercase italic">Tôi hủy (Mất phí)</button>
                    </div>`;
                }
            });
            document.getElementById('tx-don').innerHTML = h || "Đang quét đơn mới...";
        });
    }

    function saveHoSo() {
     const u = JSON.parse(localStorage.getItem('klg_u'));
        db.ref('users/'+u.p).update({ ten: document.getElementById('tx-ten').value, bl: document.getElementById('tx-bl').value, ax: document.getElementById('tx-ax').value, cv: document.getElementById('tx-cv').value }).then(() => alert("Đã lưu!"));
    }

    function adminCreateOrder() {
        const p = document.getElementById('ad-p').value, s = document.getElementById('ad-svc').value, tu = document.getElementById('ad-tu-new').value, den = document.getElementById('ad-den-new').value, dt = document.getElementById('ad-date').value, tm = document.getElementById('ad-time').value;
        if(!p || !s || !tu || !den || !dt || !tm) return alert("Nhập đủ thông tin!");
        db.ref('orders').push({ khach: p, svc: s, tu: tu, den: den, date: dt, time: tm, ghiChuAdmin: document.getElementById('ad-note-new').value, status: 'cho' });
        alert("Đã tạo!");
    }

    function pushPrice(id) {
        const p = document.getElementById('price-'+id).value, n = document.getElementById('note-'+id).value;
        if(!p) return alert("Nhập giá!");
        db.ref('orders/'+id).update({ gia: p, ghiChuAdmin: n, status: 'da' }).then(()=>alert("Đã đẩy giá!"));
    }

    function napTienTX() {
        const p = prompt("SĐT Tài xế:"), v = prompt("Số tiền nạp (K):");
        if(p && v) db.ref('users/'+p).once('value', s => {
            if(s.exists()) db.ref('users/'+p).update({ soDu: (s.val().soDu || 0) + parseInt(v) }).then(()=>alert("Đã nạp!"));
        });
    }

    function viewInfo(phone) { db.ref('users/'+phone).once('value', s => { alert(`HỒ SƠ: ${phone}\nTên: ${s.val().ten || 'Trống'}\nMK: ${s.val().pass}`); }); }
    function deleteUser(p) { if(confirm("Xóa tài khoản này?")) db.ref('users/'+p).remove(); }
    function toggleDiv(id) { document.getElementById(id).classList.toggle('hidden'); }
    function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function saveSession(p, r) { localStorage.setItem('klg_u', JSON.stringify({p, r})); location.reload(); }
    function logout() { localStorage.removeItem('klg_u'); location.reload(); }
    function showTxTab(tab) {
        document.querySelectorAll('.tx-tab').forEach(t => t.classList.add('hidden')); document.getElementById(tab).classList.remove('hidden');
        document.getElementById('tab-btn-don').className = "flex-1 py-3 font-black " + (tab==='tx-don'?'text-red-500 border-b-2 border-red-500':'text-slate-400');
        document.getElementById('tab-btn-hoso').className = "flex-1 py-3 font-black " + (tab==='tx-hoso'?'text-red-500 border-b-2 border-red-500':'text-slate-400');
    }

    window.onload = () => { 
        const u=localStorage.getItem('klg_u');
