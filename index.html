<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhaLy GO - Uy Tín Trên Từng Cây Số</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #d32f2f; --secondary: #28a745; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; min-height: 100vh; background: white; box-shadow: 0 0 15px rgba(0,0,0,0.1); position: relative; }
        .header { background: var(--primary); color: white; padding: 25px 20px; text-align: center; border-radius: 0 0 20px 20px; }
        .content { padding: 20px; }
        input, textarea, select { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 15px; outline: none; }
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .btn-main { background: var(--primary); color: white; }
        .btn-success { background: var(--secondary); color: white; }
        .btn-danger { background: #dc3545; color: white; padding: 5px 10px; border-radius: 8px; font-size: 11px; width: auto; }
        .hidden { display: none !important; }
        .xe-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
        .xe-item { border: 2px solid #eee; border-radius: 15px; padding: 10px; text-align: center; cursor: pointer; background: #fff; }
        .xe-item img { width: 45px; height: 45px; margin-bottom: 5px; }
        .xe-item.active { border-color: var(--primary); background: #fff5f5; }
        .sub-xe-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin: 10px 0; background: #fff5f5; padding: 10px; border-radius: 10px; border: 1px dashed var(--primary); }
        .sub-xe-btn { padding: 8px; border-radius: 8px; border: 1px solid #ddd; background: white; font-size: 11px; cursor: pointer; font-weight: bold; }
        .sub-xe-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; border-left: 5px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-size: 14px; display: block; }
        .admin-nav { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 5px; margin-bottom: 15px; }
        .nav-btn { background: #eee; padding: 10px 2px; border-radius: 8px; font-size: 11px; font-weight: bold; border:none; }
        .nav-btn.active { background: var(--primary); color: white; }
        .call-link { text-decoration: none; color: #28a745; font-weight: bold; display: inline-flex; align-items: center; gap: 5px; }
        .support-box { margin-top: 25px; padding: 15px; background: #e8f5e9; border-radius: 12px; text-align: center; border: 1px solid #28a745; }
    </style>
</head>
<body onload="kiemTraPhien()">

<div class="container">
    <div id="scr-login">
        <div class="header"><h1>KhaLy GO</h1><p>Vận tải Cần Thơ - Hậu Giang</p></div>
        <div class="content">
            <input type="number" id="login-sdt" placeholder="Số điện thoại">
            <input type="password" id="login-pass" placeholder="Mật khẩu">
            <button class="btn-main" onclick="xuLyDangNhap()">ĐĂNG NHẬP</button>
            <p onclick="openReg()" style="text-align:center; text-decoration:underline; cursor:pointer; margin-top:15px;">Chưa có tài khoản? Đăng ký</p>
            <div id="reg-box" class="hidden">
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button style="flex:1; font-size:11px;" onclick="dangKy('khach')">ĐĂNG KÝ KHÁCH</button>
                    <button style="flex:1; font-size:11px;" onclick="dangKy('admin')">ĐĂNG KÝ TÀI XẾ</button>
                </div>
            </div>
        </div>
    </div>

    <div id="scr-main" class="hidden">
        <div class="header"><h3 id="u-welcome">KhaLy GO</h3></div>
        <div class="content">
            <div id="view-khach" class="hidden">
                <div class="xe-grid">
                    <div class="xe-item" onclick="setXe('Xe ôm', this)"><img src="https://cdn-icons-png.flaticon.com/512/713/713437.png"><br>Xe ôm</div>
                    <div class="xe-item" id="btn-baoxe" onclick="hienSubXe(this)"><img src="https://cdn-icons-png.flaticon.com/512/3202/3202926.png"><br>Bao xe</div>
                    <div class="xe-item" onclick="setXe('Tiện chuyến', this)"><img src="https://cdn-icons-png.flaticon.com/512/1048/1048315.png"><br>Tiện chuyến</div>
                    <div class="xe-item" onclick="setXe('Xe 1 chiều', this)"><img src="https://cdn-icons-png.flaticon.com/512/744/744465.png"><br>1 chiều</div>
                </div>
                <div id="sub-baoxe" class="sub-xe-grid hidden">
                    <button class="sub-xe-btn" onclick="setXe('Bao xe 4 chỗ', this)">4 CHỖ</button>
                    <button class="sub-xe-btn" onclick="setXe('Bao xe 7 chỗ', this)">7 CHỖ</button>
                    <button class="sub-xe-btn" onclick="setXe('Bao xe 16 chỗ', this)">16 CHỖ</button>
                </div>
                <input type="text" id="u-tu" placeholder="📍 Điểm đón">
                <input type="text" id="u-den" placeholder="🏁 Điểm đến">
                <div style="display:flex; gap:5px;">
                    <input type="date" id="u-ngay">
                    <input type="time" id="u-gio">
                </div>
                <button class="btn-success" onclick="guiDon()">GỬI YÊU CẦU ĐẶT XE</button>
            </div>
            
            <div id="view-tx-don" class="hidden">
                <p style="font-weight:bold; color:var(--primary);">ĐƠN HÀNG ĐÃ DUYỆT GIÁ:</p>
                <div id="list-don-tx"></div>
            </div>

            <div class="support-box">
                <p style="margin:0 0 10px 0; font-weight:bold; color:#2e7d32; font-size:13px;">SẾP TỔNG HỖ TRỢ 24/7</p>
                <div style="display:flex; gap:10px;">
                    <a href="https://zalo.me/0789454369" target="_blank" style="flex:1; background:#0068ff; color:white; padding:10px; border-radius:8px; text-decoration:none; font-size:12px; font-weight:bold;"><i class="fa-solid fa-comments"></i> ZALO</a>
                    <a href="tel:0789454369" style="flex:1; background:#28a745; color:white; padding:10px; border-radius:8px; text-decoration:none; font-size:12px; font-weight:bold;"><i class="fa fa-phone"></i> GỌI ĐIỆN</a>
                </div>
            </div>

            <button onclick="dangXuat()" style="margin-top:20px; background:#666; color:white;">ĐĂNG XUẤT</button>
        </div>
    </div>

    <div id="scr-admin" class="hidden">
        <div class="header"><h3>QUẢN TRỊ KHALY GO</h3></div>
        <div class="content">
            <div class="admin-nav">
                <button class="nav-btn" id="t-don" onclick="loadAd('don')">ĐƠN</button>
                <button class="nav-btn" id="t-khach" onclick="loadAd('khach')">KHÁCH</button>
                <button class="nav-btn" id="t-tx" onclick="loadAd('tx')">TÀI XẾ</button>
                <button class="nav-btn" id="t-history" onclick="loadAd('history')">LỊCH SỬ</button>
            </div>
            <div id="admin-content"></div>
            <button onclick="dangXuat()" style="margin-top:20px; background:#666; color:white;">THOÁT ADMIN</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://khaly-go-23798-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const SO_SEP = "0789454369";
    let curSdt = "", curXe = "";

    function kiemTraPhien() {
        const d = localStorage.getItem('khaly_user');
        if (d) { 
            curSdt = JSON.parse(d).sdt;
            if(curSdt === SO_SEP) { vaoAdmin(); return; }
            db.ref('users/' + curSdt).once('value', s => { if(s.val()) hienThi(s.val().vaiTro); });
        }
    }

    function hienThi(role) {
        document.getElementById('scr-login').classList.add('hidden');
        document.getElementById('scr-main').classList.remove('hidden');
        if(role === 'admin') { document.getElementById('view-tx-don').classList.remove('hidden'); loadDonChoTX(); }
        else { document.getElementById('view-khach').classList.remove('hidden'); }
    }

    function xuLyDangNhap() {
        const sdt = document.getElementById('login-sdt').value, mk = document.getElementById('login-pass').value;
        if(sdt === SO_SEP) { localStorage.setItem('khaly_user', JSON.stringify({sdt: sdt})); vaoAdmin(); return; }
        db.ref('users/' + sdt).once('value', s => {
            const d = s.val();
            if(d && d.matKhau === mk) {
                localStorage.setItem('khaly_user', JSON.stringify({sdt: sdt}));
                hienThi(d.vaiTro);
            } else alert("Thông tin sai sếp ơi!");
        });
    }

    function vaoAdmin() { document.getElementById('scr-login').classList.add('hidden'); document.getElementById('scr-admin').classList.remove('hidden'); loadAd('don'); }

    function hienSubXe(el) {
        document.querySelectorAll('.xe-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('sub-baoxe').classList.remove('hidden');
        curXe = ""; 
    }

    function setXe(l, el) {
        curXe = l;
        if(!l.includes('Bao xe')) {
            document.getElementById('sub-baoxe').classList.add('hidden');
            document.querySelectorAll('.xe-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        } else {
            document.querySelectorAll('.sub-xe-btn').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
    }

    function guiDon() {
        const tu = document.getElementById('u-tu').value;
        const tg = document.getElementById('u-ngay').value + " " + document.getElementById('u-gio').value;
        if(!tu || !curXe) return alert("Sếp nhập đủ tin đặt xe nhen!");
        db.ref('don_cho_duyet').push({ khach: curSdt, loai: curXe, tu: tu, den: document.getElementById('u-den').value, tg: tg })
        .then(() => alert("Đã gửi! Đợi sếp chốt giá nhen."));
    }

    function loadAd(t) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(document.getElementById('t-'+t)) document.getElementById('t-'+t).classList.add('active');
        const view = document.getElementById('admin-content'); view.innerHTML = "Đang tải...";

        if(t === 'don') {
            db.ref('don_cho_duyet').on('value', s => {
                let h = "";
                s.forEach(c => {
                    const d = c.val();
                    h += `<div class="card">
                        <span style="font-size:11px; color:#888;">${d.tg}</span><br>
                        <b>${d.loai}</b><br>
                        <a href="tel:${d.khach}" class="call-link">📞 Khách: ${d.khach}</a><br>
                        📍 ${d.tu} ➔ ${d.den}<br>
                        <input type="text" id="gia-${c.key}" placeholder="Giá sếp chốt (VD: 500k)">
                        <button class="btn-success" onclick="duyetDon('${c.key}')" style="margin-top:10px;">DUYỆT & ĐẨY ĐƠN</button>
                    </div>`;
                });
                view.innerHTML = h || "Hết đơn mới rồi sếp!";
            });
        } else if(t === 'tx') {
            db.ref('users').orderByChild('vaiTro').equalTo('admin').once('value', s => {
                let h = ""; s.forEach(c => { if(c.key !== SO_SEP) h += `<div class="card"><a href="tel:${c.key}" class="call-link">📞 TX: ${c.key}</a> <button class="btn-danger" onclick="db.ref('users/${c.key}').remove()">XÓA</button></div>`; });
                view.innerHTML = h || "Trống";
            });
        } else if(t === 'khach') {
            db.ref('users').orderByChild('vaiTro').equalTo('khach').once('value', s => {
                let h = ""; s.forEach(c => { h += `<div class="card"><a href="tel:${c.key}" class="call-link">📞 Khách: ${c.key}</a> <button class="btn-danger" onclick="db.ref('users/${c.key}').remove()">XÓA</button></div>`; });
                view.innerHTML = h || "Trống";
            });
        } else { view.innerHTML = "Mục lịch sử đơn hoàn thành đang cập nhật."; }
    }

    function duyetDon(id) {
        const gia = document.getElementById('gia-'+id).value;
        if(!gia) return alert("Nhập giá sếp ơi!");
        db.ref('don_cho_duyet/' + id).once('value', s => {
            const data = s.val(); data.gia = gia;
            db.ref('don_da_duyet').push(data).then(() => { db.ref('don_cho_duyet/' + id).remove(); alert("Xong! Đơn đã tới máy TX."); });
        });
    }

    function loadDonChoTX() {
        db.ref('don_da_duyet').on('value', s => {
            let h = "";
            s.forEach(c => {
                const d = c.val();
                h += `<div class="card" style="border-left-color:green">
                    <b style="color:green; font-size:16px;">GIÁ CHỐT: ${d.gia}</b><br>
                    <b>Xe: ${d.loai}</b><br>
                    <a href="tel:${d.khach}" class="call-link">📞 Khách: ${d.khach}</a><br>
                    📍 ${d.tu} ➔ ${d.den}
                </div>`;
            });
            document.getElementById('list-don-tx').innerHTML = h || "Đang chờ đơn sếp duyệt...";
        });
    }

    function dangKy(role) {
        const sdt = document.getElementById('login-sdt').value, mk = document.getElementById('login-pass').value;
        db.ref('users/' + sdt).set({ matKhau: mk, vaiTro: role }).then(() => { alert("Đăng ký thành công!"); location.reload(); });
    }
    function dangXuat() { localStorage.removeItem('khaly_user'); location.reload(); }
    function openReg() { document.getElementById('reg-box').classList.toggle('hidden'); }
</script>
</body>
</html>
