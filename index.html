<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KLG - Hệ Thống Vận Tải</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #d32f2f; --secondary: #28a745; --bg: #f4f7f6; --blue: #1a73e8; --dark: #1a1a1a; }
        html, body { overscroll-behavior-y: contain; overflow: hidden; height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); }
        .container { width: 100%; max-width: 450px; height: 100%; margin: auto; background: white; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        /* Header đen chuẩn thương hiệu */
        .header-top { background: var(--dark); color: white; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; font-weight: bold; font-size: 18px; }
        .logo-box { width: 35px; height: 35px; border-radius: 4px; overflow: hidden; background: #000; }

        .red-banner { background: var(--primary); padding: 40px 20px; color: white; text-align: center; border-radius: 0 0 35px 35px; margin-bottom: 30px; }
        .red-banner h1 { margin: 0; font-size: 42px; letter-spacing: 2px; }

        .content { padding: 15px; flex: 1; overflow-y: auto; }
        
        /* Input & Buttons */
        input, select { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 16px; outline: none; }
        button { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        .btn-red { background: var(--primary); color: white; text-transform: uppercase; }
        .btn-nhan { background: var(--secondary); color: white; }
        .btn-blue { background: var(--blue); color: white; }

        /* Card đơn hàng */
        .card-don { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #eee; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .gia-don { color: var(--primary); font-size: 22px; font-weight: bold; }
        .phi-tag { font-size: 12px; color: #666; background: #fff3e0; padding: 4px 8px; border-radius: 5px; display: inline-block; margin: 5px 0; }
        
        .wallet-bar { background: #E3F2FD; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .hidden { display: none !important; }
        
        /* Nav */
        .bottom-nav { height: 75px; background: white; border-top: 1px solid #eee; display: flex; justify-content: space-around; align-items: center; padding-bottom: 10px; }
        .nav-item { text-align: center; color: #999; font-size: 12px; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--blue); }
    </style>
</head>
<body onload="kiemTraPhien()">

<div class="container">
    <div class="header-top">
        <span>KhaLy GO</span>
        <div class="logo-box"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR6A6B7Nn-G-T7T1N3l3o8GqX7z6r6O7X-zWg&s" width="100%"></div>
    </div>

    <div id="scr-auth">
        <div class="red-banner"><h1>KLG</h1><p>Hệ thống vận tải 4.0</p></div>
        <div class="content">
            <div id="box-login">
                <input type="number" id="l-sdt" placeholder="Số điện thoại">
                <input type="password" id="l-pass" placeholder="Mật khẩu">
                <button class="btn-red" onclick="xuLyLogin()">VÀO HỆ THỐNG</button>
                <a onclick="showReg()" style="display:block; text-align:center; margin-top:20px; color:var(--blue); cursor:pointer; font-size:14px;">Chưa có tài khoản? Đăng ký ngay</a>
            </div>

            <div id="box-reg" class="hidden">
                <p style="text-align:center; font-weight:bold;">ĐĂNG KÝ THÀNH VIÊN</p>
                <input type="number" id="r-sdt" placeholder="Số điện thoại mới">
                <input type="password" id="r-pass" placeholder="Mật khẩu mới">
                <select id="r-role">
                    <option value="tx">Tôi là Tài xế</option>
                    <option value="kh">Tôi là Khách hàng</option>
                </select>
                <button class="btn-red" onclick="handleRegister()">XÁC NHẬN ĐĂNG KÝ</button>
                <a onclick="location.reload()" style="display:block; text-align:center; margin-top:20px; color:var(--blue); cursor:pointer;">Quay lại Đăng nhập</a>
            </div>
        </div>
    </div>

    <div id="scr-tx" class="hidden" style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
        <div class="content">
            <div class="wallet-bar">
                <div><span>Ví tài xế:</span><br><b id="val-du" style="font-size:20px; color:var(--blue);">0K</b></div>
                <button onclick="switchTab('profile')" style="width:auto; padding:8px 12px; margin:0; font-size:12px; background:var(--blue); color:white;">NẠP TIỀN</button>
            </div>

            <div id="tab-noti">
                <p style="font-weight:bold; border-left:4px solid var(--primary); padding-left:10px;">DANH SÁCH ĐƠN MỚI</p>
                <div id="list-don-cho"></div>
                
                <div id="don-dang-chay" class="hidden">
                    <div class="card-don" style="border-left:5px solid var(--secondary); background:#f0fff4;">
                        <p style="font-weight:bold; color:var(--secondary); margin-top:0;">🚀 CHUYẾN ĐANG THỰC HIỆN</p>
                        <div id="chi-tiet-don-chay"></div>
                        <button class="btn-red" style="background:#333;" onclick="hoanThanhChuyen()">HOÀN THÀNH & THU TIỀN</button>
                    </div>
                </div>
            </div>

            <div id="tab-profile" class="hidden">
                <div style="text-align:center; padding:20px; background:#fffde7; border-radius:15px; border:1px dashed #fbc02d;">
                    <p style="font-weight:bold; color:var(--primary);">NẠP TIỀN QUA VIETQR</p>
                    <img id="qr-code" src="" style="width:220px; border-radius:10px;">
                    <p style="font-size:12px; color:#666; margin-top:10px;">Phí sàn: 20% trừ trực tiếp khi nhận đơn.</p>
                </div>
                <button class="btn-blue" style="margin-top:20px;" onclick="window.location.href='tel:0789454369'">GỌI TỔNG ĐÀI HỖ TRỢ</button>
                <button onclick="dangXuat()" style="background:#eee; color:#666; margin-top:10px;">ĐĂNG XUẤT</button>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" id="m-noti" onclick="switchTab('noti')"><i class="fa fa-car fa-lg"></i><br>Nhận đơn</div>
            <div class="nav-item" id="m-profile" onclick="switchTab('profile')"><i class="fa fa-wallet fa-lg"></i><br>Ví của tôi</div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://khaly-go-23798-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let curSdt = "", myWallet = 0;

    // QUẢN LÝ PHIÊN
    function kiemTraPhien() {
        const saved = localStorage.getItem('klg_user');
        if(saved) {
            const user = JSON.parse(saved);
            curSdt = user.sdt;
            document.getElementById('scr-auth').classList.add('hidden');
            document.getElementById('scr-tx').classList.remove('hidden');
            document.getElementById('qr-code').src = `https://img.vietqr.io/image/vcb-0789454369-compact.jpg?amount=100000&addInfo=KLG%20${curSdt}`;
            theoDoiVi();
            loadDonHang();
        }
    }

    function showReg() {
        document.getElementById('box-login').classList.add('hidden');
        document.getElementById('box-reg').classList.remove('hidden');
    }

    function handleRegister() {
        const s = document.getElementById('r-sdt').value, p = document.getElementById('r-pass').value, r = document.getElementById('r-role').value;
        if(!s || !p) return alert("Sếp điền đủ SĐT và Mật khẩu nhé!");
        db.ref('users/' + s).set({pass: p, role: r, soDu: 0}).then(() => {
            alert("Đăng ký thành công!");
            location.reload();
        });
    }

    function xuLyLogin() {
        const s = document.getElementById('l-sdt').value, p = document.getElementById('l-pass').value;
        if(!s || !p) return alert("Nhập đủ thông tin sếp ơi!");
        
        // Check Admin của sếp
        if(s === "0789454369" && p === "19861990LyVinh@") {
            localStorage.setItem('klg_user', JSON.stringify({sdt: s, role: 'admin'}));
            alert("Chào Admin!"); location.reload(); return;
        }

        db.ref('users/' + s).once('value', ss => {
            const u = ss.val();
            if(u && u.pass === p) {
                localStorage.setItem('klg_user', JSON.stringify({sdt: s, role: u.role}));
                location.reload();
            } else alert("Sai số điện thoại hoặc mật khẩu!");
        });
    }

    // LOGIC TÀI XẾ
    function theoDoiVi() {
        db.ref('users/' + curSdt).on('value', s => {
            myWallet = s.val()?.soDu || 0;
            document.getElementById('val-du').innerText = myWallet + "K";
        });
    }

    function loadDonHang() {
        db.ref('don_da_duyet').on('value', s => {
            let h = "";
            s.forEach(child => {
                const d = child.val();
                const phi = Math.round(parseInt(d.gia) * 0.2);
                h += `
                <div class="card-don">
                    <div style="display:flex; justify-content:space-between; align-items:start;">
                        <span class="gia-don">${d.gia}K</span>
                        <span class="phi-tag">Phí sàn: ${phi}K</span>
                    </div>
                    <p style="margin:10px 0;">📍 ${d.tu} <br> 🏁 ${d.den}</p>
                    <button class="btn-nhan" onclick="xacNhanNhanDon('${child.key}', ${phi})">NHẬN CHUYẾN</button>
                </div>`;
            });
            document.getElementById('list-don-cho').innerHTML = h || "<p style='text-align:center; color:#999; margin-top:30px;'>Đang tìm chuyến xe gần nhất...</p>";
        });
    }

    function xacNhanNhanDon(id, phi) {
        if(myWallet < phi) {
            alert(`Ví không đủ ${phi}K để trừ phí sàn. Sếp nạp thêm tiền nhé!`);
            switchTab('profile'); return;
        }
        if(confirm(`Hệ thống sẽ trừ ${phi}K phí nhận đơn. Sếp đồng ý?`)) {
            db.ref('users/' + curSdt).update({ soDu: myWallet - phi }).then(() => {
                db.ref('don_da_duyet/' + id).once('value', s => {
                    const data = s.val();
                    db.ref('don_dang_chay/' + curSdt).set(data);
                    db.ref('don_da_duyet/' + id).remove();
                    hienDonDangChay(data);
                });
            });
        }
    }

    function hienDonDangChay(d) {
        document.getElementById('list-don-cho').classList.add('hidden');
        document.getElementById('don-dang-chay').classList.remove('hidden');
        document.getElementById('chi-tiet-don-chay').innerHTML = `
            <p><b>Khách:</b> <a href="tel:${d.khach}" style="font-size:20px; color:var(--blue); font-weight:bold;">${d.khach} 📞</a></p>
            <p><b>Điểm đón:</b> ${d.tu}</p>
            <p><b>Điểm đến:</b> ${d.den}</p>
            <p><b>Giá thu khách:</b> <span style="color:red; font-size:18px; font-weight:bold;">${d.gia}K</span></p>
        `;
    }

    function hoanThanhChuyen() {
        if(confirm("Xác nhận đã trả khách và thu tiền xong?")) {
            db.ref('don_dang_chay/' + curSdt).remove().then(() => {
                alert("Hoàn thành chuyến! Chúc sếp nhiều đơn mới.");
                location.reload();
            });
        }
    }

    function switchTab(t) {
        document.getElementById('tab-noti').classList.toggle('hidden', t !== 'noti');
        document.getElementById('tab-profile').classList.toggle('hidden', t !== 'profile');
        document.getElementById('m-noti').classList.toggle('active', t === 'noti');
        document.getElementById('m-profile').classList.toggle('active', t === 'profile');
    }

    function dangXuat() { localStorage.removeItem('klg_user'); location.reload(); }
</script>
</body>
</html>
