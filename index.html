<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLG - Uy Tín Trên Từng Cây Số</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #d32f2f; --secondary: #28a745; --bg: #f4f7f6; --blue: #1a73e8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; min-height: 100vh; background: white; position: relative; padding-bottom: 80px; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .header { background: var(--primary); color: white; padding: 25px 20px; text-align: center; border-radius: 0 0 25px 25px; }
        .content { padding: 15px; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-main { background: var(--primary); color: white; }
        .btn-success { background: var(--secondary); color: white; }
        .btn-blue { background: var(--blue); color: white; }
        .hidden { display: none !important; }

        /* Wallet & Profile */
        .wallet-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #eee; }
        .wallet-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; text-align: center; margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; }
        .wallet-item b { display: block; font-size: 18px; color: #333; }
        .wallet-item span { font-size: 12px; color: #777; }

        /* Order Card */
        .card-noti { background: #f0f7ff; border-radius: 12px; padding: 15px; margin-bottom: 12px; border-left: 5px solid var(--blue); cursor: pointer; display: flex; align-items: center; gap: 12px; }
        
        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; height: 70px; background: white; border-top: 1px solid #eee; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { text-align: center; color: #999; font-size: 12px; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--blue); }
    </style>
</head>
<body onload="kiemTraPhien()">

<div class="container">
    <div id="scr-login">
        <div class="header"><h1>KLG</h1><p>Vận tải Cần Thơ - Hậu Giang</p></div>
        <div class="content">
            <input type="number" id="l-sdt" placeholder="Số điện thoại">
            <input type="password" id="l-pass" placeholder="Mật khẩu">
            <button class="btn-main" onclick="xuLyLogin()">ĐĂNG NHẬP</button>
            <p onclick="document.getElementById('reg-box').classList.toggle('hidden')" style="text-align:center; text-decoration:underline; cursor:pointer; margin-top:15px; color:#666;">Đăng ký tài khoản</p>
            <div id="reg-box" class="hidden" style="margin-top:10px;">
                <button class="btn-blue" onclick="dangKy('admin')">ĐĂNG KÝ TÀI XẾ</button>
                <button class="btn-main" onclick="dangKy('khach')" style="margin-top:5px;">ĐĂNG KÝ KHÁCH</button>
            </div>
        </div>
    </div>

    <div id="scr-admin" class="hidden">
        <div class="header"><h3>QUẢN TRỊ KLG</h3></div>
        <div class="content">
            <p style="font-weight:bold; color:var(--blue); margin-top:0;">TẠO ĐƠN KHÁCH GỌI TRỰC TIẾP</p>
            <input type="number" id="ad-sdt" placeholder="SĐT Khách">
            <input type="text" id="ad-tu" placeholder="📍 Điểm đón">
            <input type="text" id="ad-den" placeholder="🏁 Điểm đến">
            <input type="text" id="ad-gia" placeholder="Giá chốt (VD: 500k)">
            <button class="btn-success" onclick="adTaoDon()">ĐẨY ĐƠN LÊN APP KLG</button>
            <button onclick="dangXuat()" style="margin-top:20px; background:#666; color:white;">THOÁT ADMIN</button>
        </div>
    </div>

    <div id="scr-tx" class="hidden">
        <div class="header"><h3 id="tx-head-name">Đối tác KLG</h3></div>
        <div class="content">
            <div id="tab-noti">
                <h4 style="margin-top:0;">Đơn hàng mới</h4>
                <div id="list-noti-tx"></div>
            </div>

            <div id="tab-profile" class="hidden">
                <div class="wallet-card">
                    <div style="display:flex; align-items:center; gap:15px;">
                        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" style="width:60px; border-radius:50%;">
                        <div>
                            <b id="tx-name" style="font-size:18px;">Tài xế KLG</b><br>
                            <span style="color:var(--secondary); font-size:13px;">● Đang hoạt động</span>
                        </div>
                    </div>
                    <div class="wallet-grid">
                        <div class="wallet-item"><span>Đã nạp</span><b id="val-nap">0K</b></div>
                        <div class="wallet-item"><span>Phí</span><b id="val-phi">0K</b></div>
                        <div class="wallet-item"><span>Số dư</span><b id="val-du" style="color:var(--blue)">0K</b></div>
                    </div>
                </div>

                <div id="form-dk-tx" style="background:#f9f9f9; padding:15px; border-radius:15px; border:1px dashed #ccc;">
                    <p style="font-weight:bold; margin-top:0; color:var(--primary);">GỬI HỒ SƠ ĐỂ SẾP DUYỆT</p>
                    <input type="text" id="tx-hoten" placeholder="Họ và tên">
                    <input type="text" id="tx-bienso" placeholder="Biển số xe">
                    <button class="btn-blue" onclick="guiHoSoTX()">GỬI THÔNG TIN</button>
                </div>

                <button onclick="dangXuat()" style="margin-top:20px; background:#eee; color:#333;">ĐĂNG XUẤT</button>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" id="m-noti" onclick="switchTab('noti')"><i class="fa fa-car"></i><br>Cuốc xe</div>
            <div class="nav-item" id="m-profile" onclick="switchTab('profile')"><i class="fa fa-wallet"></i><br>Tài khoản</div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://khaly-go-23798-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const SO_SEP = "0789454369";
    let curSdt = "";

    function kiemTraPhien() {
        const u = localStorage.getItem('khaly_user');
        if(u) {
            curSdt = JSON.parse(u).sdt;
            if(curSdt === SO_SEP) hienAdmin(); else hienTX();
        }
    }

    // --- ADMIN ---
    function hienAdmin() {
        document.getElementById('scr-login').classList.add('hidden');
        document.getElementById('scr-admin').classList.remove('hidden');
    }

    function adTaoDon() {
        const sdt = document.getElementById('ad-sdt').value, tu = document.getElementById('ad-tu').value, 
              den = document.getElementById('ad-den').value, gia = document.getElementById('ad-gia').value;
        if(!sdt || !tu || !gia) return alert("Sếp điền đủ thông tin nhen!");
        db.ref('don_da_duyet').push({khach: sdt, tu: tu, den: den, gia: gia, nguon: "Sếp tạo"}).then(() => {
            alert("Đã đẩy đơn lên KLG!");
            document.getElementById('ad-sdt').value = ""; document.getElementById('ad-tu').value = "";
        });
    }

    // --- TÀI XẾ ---
    function hienTX() {
        document.getElementById('scr-login').classList.add('hidden');
        document.getElementById('scr-tx').classList.remove('hidden');
        db.ref('users/' + curSdt).on('value', s => {
            const d = s.val();
            if(d) {
                document.getElementById('tx-name').innerText = d.hoTen || "Tài xế mới";
                document.getElementById('val-nap').innerText = (d.daNap || 0) + "K";
                document.getElementById('val-phi').innerText = (d.phi || 0) + "K";
                document.getElementById('val-du').innerText = (d.soDu || 0) + "K";
                if(d.hoTen) document.getElementById('form-dk-tx').classList.add('hidden');
            }
        });
        loadDonTX();
    }

    function loadDonTX() {
        db.ref('don_da_duyet').on('value', s => {
            let h = "";
            s.forEach(c => {
                const d = c.val();
                h += `<div class="card-noti" onclick="nhanChuyen('${c.key}')">
                    <div style="background:var(--blue); color:white; width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center;"><i class="fa fa-car"></i></div>
                    <div style="flex:1"><b style="color:var(--blue)">${d.gia}</b><br><small>${d.tu} ➔ ${d.den}</small></div>
                </div>`;
            });
            document.getElementById('list-noti-tx').innerHTML = h || "<p style='color:#999; text-align:center;'>Đang chờ đơn...</p>";
        });
    }

    function nhanChuyen(id) {
        if(confirm("Xác nhận nhận chuyến?")) {
            db.ref('don_da_duyet/' + id).remove().then(() => alert("Nhận đơn thành công!"));
        }
    }

    function guiHoSoTX() {
        const ten = document.getElementById('tx-hoten').value, bs = document.getElementById('tx-bienso').value;
        if(!ten || !bs) return alert("Nhập đủ thông tin sếp ơi!");
        db.ref('users/' + curSdt).update({ hoTen: ten, bienSo: bs, soDu: 0, daNap: 0, phi: 0 }).then(() => alert("Đã gửi hồ sơ!"));
    }

    // --- CHUNG ---
    function switchTab(t) {
        document.getElementById('tab-noti').classList.toggle('hidden', t !== 'noti');
        document.getElementById('tab-profile').classList.toggle('hidden', t !== 'profile');
        document.getElementById('m-noti').classList.toggle('active', t === 'noti');
        document.getElementById('m-profile').classList.toggle('active', t === 'profile');
    }

    function xuLyLogin() {
        const sdt = document.getElementById('l-sdt').value;
        localStorage.setItem('khaly_user', JSON.stringify({sdt: sdt}));
        location.reload();
    }

    function dangKy(role) {
        const sdt = document.getElementById('l-sdt').value, mk = document.getElementById('l-pass').value;
        db.ref('users/' + sdt).set({ matKhau: mk, vaiTro: role }).then(() => alert("Xong! Hãy đăng nhập."));
    }

    function dangXuat() { localStorage.removeItem('khaly_user'); location.reload(); }
</script>
</body>
</html>
