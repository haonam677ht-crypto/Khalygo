<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhaLy GO - Uy Tín Trên Từng Cây Số</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #d32f2f; --secondary: #28a745; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; min-height: 100vh; background: white; box-shadow: 0 0 15px rgba(0,0,0,0.1); position: relative; }
        .header { background: var(--primary); color: white; padding: 25px 20px; text-align: center; border-radius: 0 0 20px 20px; }
        .content { padding: 20px; }
        input, textarea, select { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 15px; outline: none; }
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .btn-main { background: var(--primary); color: white; }
        .btn-success { background: var(--secondary); color: white; }
        .btn-danger { background: #dc3545; color: white; padding: 5px 10px; border-radius: 8px; font-size: 11px; width: auto; }
        .hidden { display: none !important; }
        .xe-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
        .xe-item { border: 2px solid #eee; border-radius: 15px; padding: 10px; text-align: center; cursor: pointer; background: #fff; }
        .xe-item img { width: 45px; height: 45px; margin-bottom: 5px; }
        .xe-item.active { border-color: var(--primary); background: #fff5f5; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 12px; border-left: 8px solid var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .admin-nav { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 15px; }
        .nav-btn { background: #eee; padding: 10px 2px; border-radius: 8px; font-size: 11px; font-weight: bold; border:none; }
        .nav-btn.active { background: var(--primary); color: white; }
        .call-link { text-decoration: none; color: #28a745; font-weight: bold; }
    </style>
</head>
<body onload="kiemTraPhien()">

<div class="container">
    <div id="scr-login">
        <div class="header"><h1>KhaLy GO</h1><p>Vận tải Cần Thơ - Hậu Giang</p></div>
        <div class="content">
            <input type="number" id="login-sdt" placeholder="Số điện thoại">
            <input type="password" id="login-pass" placeholder="Mật khẩu">
            <button class="btn-main" onclick="xuLyDangNhap()">ĐĂNG NHẬP</button>
            <p onclick="openReg()" style="text-align:center; text-decoration:underline; cursor:pointer; margin-top:15px;">Chưa có tài khoản? Đăng ký</p>
            <div id="reg-box" class="hidden">
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button style="font-size:11px;" onclick="dangKy('khach')">KHÁCH</button>
                    <button style="font-size:11px;" onclick="dangKy('admin')">TÀI XẾ</button>
                </div>
            </div>
        </div>
    </div>

    <div id="scr-main" class="hidden">
        <div class="header"><h3 id="u-welcome">Chào mừng sếp!</h3></div>
        <div class="content">
            <div id="view-khach" class="hidden">
                <div class="xe-grid">
                    <div class="xe-item" onclick="setXe('Xe ôm', this)"><img src="https://cdn-icons-png.flaticon.com/512/713/713437.png"><br>Xe ôm</div>
                    <div class="xe-item" onclick="setXe('Bao xe', this)"><img src="https://cdn-icons-png.flaticon.com/512/3202/3202926.png"><br>Bao xe</div>
                </div>
                <input type="text" id="u-tu" placeholder="📍 Điểm đón">
                <input type="text" id="u-den" placeholder="🏁 Điểm đến">
                <button class="btn-success" onclick="guiDon()">GỬI YÊU CẦU ĐẶT XE</button>
            </div>
            
            <div id="view-tx-don" class="hidden">
                <p style="font-weight:bold;">ĐƠN HÀNG ĐÃ CHỐT GIÁ:</p>
                <div id="list-don-tx"></div>
            </div>
            <button onclick="dangXuat()" style="margin-top:20px; background:#666; color:white;">ĐĂNG XUẤT</button>
        </div>
    </div>

    <div id="scr-admin" class="hidden">
        <div class="header"><h3>QUẢN TRỊ KHALY GO</h3></div>
        <div class="content">
            <div class="admin-nav">
                <button class="nav-btn active" id="t-don" onclick="showTab('don')">ĐƠN</button>
                <button class="nav-btn" id="t-khach" onclick="showTab('khach')">KHÁCH</button>
                <button class="nav-btn" id="t-tx" onclick="showTab('tx')">TÀI XẾ</button>
                <button class="nav-btn" id="t-gopy" onclick="showTab('gopy')">GÓP Ý</button>
            </div>
            <div id="admin-content"></div>
            <button onclick="dangXuat()" style="margin-top:20px; background:#666; color:white;">THOÁT ADMIN</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://khaly-go-23798-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const SO_SEP = "0789454369";
    const MK_SEP = "19861990LyVinh@";

    function kiemTraPhien() {
        const d = localStorage.getItem('khaly_user');
        if (d) {
            const u = JSON.parse(d);
            if(u.sdt === SO_SEP) vaoAdmin();
            else db.ref('users/' + u.sdt).once('value', s => { if(s.val()) hienThi(s.val().vaiTro); });
        }
    }

    function xuLyDangNhap() {
        const sdt = document.getElementById('login-sdt').value;
        const mk = document.getElementById('login-pass').value;

        if(sdt === SO_SEP && mk === MK_SEP) {
            localStorage.setItem('khaly_user', JSON.stringify({sdt: sdt}));
            vaoAdmin();
            return;
        }

        db.ref('users/' + sdt).once('value', s => {
            const d = s.val();
            if(d && d.matKhau === mk) {
                localStorage.setItem('khaly_user', JSON.stringify({sdt: sdt}));
                hienThi(d.vaiTro);
            } else alert("Sai thông tin đăng nhập!");
        });
    }

    function hienThi(v) {
        document.getElementById('scr-login').classList.add('hidden');
        document.getElementById('scr-main').classList.remove('hidden');
        if(v === 'admin') {
            document.getElementById('view-tx-don').classList.remove('hidden');
            loadDonChoTX();
        } else {
            document.getElementById('view-khach').classList.remove('hidden');
        }
    }

    function vaoAdmin() {
        document.getElementById('scr-login').classList.add('hidden');
        document.getElementById('scr-admin').classList.remove('hidden');
        showTab('don');
    }

    function showTab(tab) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('t-' + tab).classList.add('active');
        const view = document.getElementById('admin-content');

        if(tab === 'don') {
            db.ref('don_cho_duyet').on('value', s => {
                let h = "";
                s.forEach(c => {
                    const d = c.val();
                    h += `<div class="card">
                        <b>${d.loai}</b><br>📞 <a href="tel:${d.khach}" class="call-link">${d.khach}</a><br>
                        📍 ${d.tu} ➔ ${d.den}<br>
                        <input type="text" id="gia-${c.key}" placeholder="Nhập giá chốt...">
                        <button class="btn-success" onclick="duyetDon('${c.key}')" style="margin-top:10px;">DUYỆT & ĐẨY ĐƠN</button>
                    </div>`;
                });
                view.innerHTML = h || "Chưa có đơn mới.";
            });
        } else if(tab === 'khach' || tab === 'tx') {
            const role = (tab === 'khach') ? 'khach' : 'admin';
            db.ref('users').orderByChild('vaiTro').equalTo(role).once('value', s => {
                let h = "";
                s.forEach(c => { h += `<div class="card"><b>SĐT: ${c.key}</b><br>MK: ${c.val().matKhau}</div>`; });
                view.innerHTML = h || "Trống.";
            });
        } else { view.innerHTML = "Tính năng Góp ý đang cập nhật."; }
    }

    function duyetDon(id) {
        const gia = document.getElementById('gia-'+id).value;
        if(!gia) return alert("Sếp nhập giá mới duyệt được!");
        db.ref('don_cho_duyet/' + id).once('value', s => {
            const data = s.val(); data.gia = gia;
            db.ref('don_da_duyet').push(data).then(() => {
                db.ref('don_cho_duyet/' + id).remove();
                alert("Đã duyệt đơn!");
            });
        });
    }

    function loadDonChoTX() {
        db.ref('don_da_duyet').on('value', s => {
            let h = "";
            s.forEach(c => {
                const d = c.val();
                h += `<div class="card" style="border-left-color:green">
                    <b style="color:green">GIÁ CHỐT: ${d.gia}</b><br>
                    📞 <a href="tel:${d.khach}" class="call-link">Gọi khách: ${d.khach}</a><br>
                    📍 ${d.tu} ➔ ${d.den}
                </div>`;
            });
            document.getElementById('list-don-tx').innerHTML = h || "Chưa có đơn chốt.";
        });
    }

    function guiDon() {
        const tu = document.getElementById('u-tu').value;
        if(!tu) return alert("Nhập điểm đón sếp ơi!");
        const u = JSON.parse(localStorage.getItem('khaly_user'));
        db.ref('don_cho_duyet').push({
            khach: u.sdt, tu: tu, den: document.getElementById('u-den').value, loai: curXe || 'Bao xe'
        }).then(() => alert("Đã gửi! Sếp sẽ gọi báo giá ngay."));
    }

    function setXe(l, el) { curXe = l; document.querySelectorAll('.xe-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); }
    function dangKy(role) {
        const sdt = document.getElementById('login-sdt').value, mk = document.getElementById('login-pass').value;
        db.ref('users/' + sdt).set({ matKhau: mk, vaiTro: role }).then(() => { alert("Xong! Đăng nhập đi sếp."); location.reload(); });
    }
    function dangXuat() { localStorage.removeItem('khaly_user'); location.reload(); }
    function openReg() { document.getElementById('reg-box').classList.toggle('hidden'); }
</script>
</body>
</html>
